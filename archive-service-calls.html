<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex,nofollow,noarchive" />
  <title>Wilson AC & Appliance - Archived Service Calls</title>
  <link rel="stylesheet" href="internal-shell.css" />
  <style>
    :root {
      --bg: #f7f8fc;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #dbe1ea;
      --primary: #635bff;
      --shadow: 0 10px 35px rgba(0, 0, 0, 0.08);
      --radius: 18px;
      --scheduled-bg: #ecfdf5;
      --scheduled-text: #065f46;
      --cancelled-bg: #fef2f2;
      --cancelled-text: #991b1b;
      --neutral-bg: #eef2ff;
      --neutral-text: #4338ca;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #eef2ff 0%, var(--bg) 100%);
      color: var(--text);
      min-height: 100vh;
      padding: 32px 16px;
    }

    .wrap {
      max-width: 1500px;
      margin: 0 auto;
    }

    .card {
      background: var(--card);
      border: 1px solid rgba(99, 91, 255, 0.12);
      box-shadow: var(--shadow);
      border-radius: var(--radius);
      padding: 24px;
    }

    .intro {
      margin-bottom: 18px;
    }

    .intro h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }

    .intro p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
      font-size: 14px;
    }

    .toolbar {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    input, select, button {
      font: inherit;
    }

    input, select {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      background: #fff;
      color: var(--text);
      outline: none;
      width: 100%;
    }

    input[type="search"] {
      flex: 1;
      min-width: 260px;
    }

    .filter-select {
      width: 220px;
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1220px;
    }

    th, td {
      text-align: left;
      padding: 14px 10px;
      border-bottom: 1px solid #edf1f7;
      vertical-align: top;
      font-size: 14px;
    }

    th {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      white-space: nowrap;
    }

    .strong { font-weight: 700; }
    .small { font-size: 12px; line-height: 1.45; }
    .muted { color: var(--muted); }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; font-size: 12px; word-break: break-all; }

    .badge {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 700;
      line-height: 1;
      white-space: nowrap;
    }

    .badge-scheduled { background: var(--scheduled-bg); color: var(--scheduled-text); }
    .badge-cancelled { background: var(--cancelled-bg); color: var(--cancelled-text); }
    .badge-neutral { background: var(--neutral-bg); color: var(--neutral-text); }

    .request-unit {
      margin-bottom: 10px;
      padding-bottom: 10px;
      border-bottom: 1px dashed #e5e7eb;
    }

    .request-unit:last-child {
      margin-bottom: 0;
      padding-bottom: 0;
      border-bottom: none;
    }

    .copy-ref-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }

    .copy-ref-label {
      min-width: 110px;
      font-weight: 600;
    }

    .copy-ref-value {
      display: inline-block;
      background: #f3f4f6;
      border-radius: 8px;
      padding: 6px 8px;
    }

    .copy-ref-btn {
      appearance: none;
      border: 1px solid #dbe1ea;
      background: #fff;
      color: #374151;
      padding: 6px 10px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }

    .copy-ref-btn:hover {
      background: #eef2ff;
      color: #3730a3;
    }

    .empty {
      padding: 18px 0 6px;
      color: var(--muted);
    }
  </style>
</head>
<body data-shell-label="Archived Service Calls" data-shell-icon="service">
  <div class="wrap">
    <div id="internal-shell-header"></div>
    <div class="card">
      <div class="intro">
        <h1>Archived Service Calls</h1>
        <p>These are service requests aged 31-90 days with a status of Call Scheduled or Call Cancelled. Records older than 90 days are purged automatically.</p>
      </div>

      <div class="toolbar">
        <input
          type="search"
          id="searchFilter"
          placeholder="Search customer, phone, email, address, model, serial, issue, or notes"
        />

        <select id="statusFilter" class="filter-select">
          <option value="all">All archive statuses</option>
          <option value="Call Scheduled">Call Scheduled</option>
          <option value="Call Cancelled">Call Cancelled</option>
        </select>

        <select id="cardFilter" class="filter-select">
          <option value="all">All card states</option>
          <option value="saved">Card saved</option>
          <option value="pending">Pending / not saved</option>
          <option value="not_required">No card required</option>
        </select>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Submitted</th>
              <th>Status</th>
              <th>Customer</th>
              <th>Address / Contact</th>
              <th>Request Details</th>
              <th>Card Status</th>
              <th>Stripe Refs</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <tr><td colspan="7" class="empty">Loading archived service requests...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
    <div id="internal-shell-footer"></div>
  </div>

  <script src="internal-shell.js"></script>
  <script>
    const tableBody = document.getElementById("tableBody");
    const searchFilter = document.getElementById("searchFilter");
    const statusFilter = document.getElementById("statusFilter");
    const cardFilter = document.getElementById("cardFilter");
    let allRows = [];

    function formatDate(value) {
      if (!value) return "-";
      return new Date(value).toLocaleString("en-US", {
        month: "2-digit",
        day: "2-digit",
        year: "2-digit",
        hour: "numeric",
        minute: "2-digit"
      });
    }

    function escapeHtml(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function formatAddress(address) {
      if (!address) return "-";
      return [
        address.line1,
        address.line2,
        address.city,
        address.state,
        address.zip
      ].filter(Boolean).join(", ");
    }

    function hasSavedCard(row) {
      return !!(row.customerId && row.paymentMethodId);
    }

    function cardState(row) {
      if (row.cardRequired === false || row.purchasedWithin12Months === "Yes") {
        return "not_required";
      }
      if (hasSavedCard(row)) {
        return "saved";
      }
      return "pending";
    }

    function cardLabel(row) {
      const state = cardState(row);

      if (state === "not_required") {
        return {
          text: "No card required",
          className: "badge badge-neutral"
        };
      }

      if (state === "saved") {
        const brand = (row.cardBrand || "").toUpperCase();
        const last4 = row.last4 ? ` •••• ${row.last4}` : "";
        return {
          text: `Card saved${brand || last4 ? ` - ${brand}${last4}` : ""}`,
          className: "badge badge-scheduled"
        };
      }

      return {
        text: "Pending card",
        className: "badge badge-neutral"
      };
    }

    function queueBadge(status) {
      if (status === "Call Scheduled") {
        return `<span class="badge badge-scheduled">Call Scheduled</span>`;
      }
      return `<span class="badge badge-cancelled">Call Cancelled</span>`;
    }

    function formatUnits(units = []) {
      if (!units.length) {
        return `<div class="request-unit">No unit details submitted.</div>`;
      }

      return units.map((unit, index) => `
        <div class="request-unit">
          <div><span class="strong">Unit ${index + 1}</span></div>
          <div class="strong">${escapeHtml([unit.brand, unit.applianceType].filter(Boolean).join(" ") || "-")}</div>
          <div class="small">
            Model: ${escapeHtml(unit.model || "-")}<br>
            Serial: ${escapeHtml(unit.serial || "-")}<br>
            Purchased from us: ${escapeHtml(unit.purchasedFromUs || "-")}<br>
            Merged: ${escapeHtml(unit.stacked || "-")}
          </div>
          <div class="small"><span class="strong">Problem:</span> ${escapeHtml(unit.problemDescription || "-")}</div>
        </div>
      `).join("");
    }

    function buildSearchHaystack(row) {
      const unitText = (row.units || []).map((u) =>
        [
          u.applianceType,
          u.brand,
          u.model,
          u.serial,
          u.problemDescription,
          u.purchasedFromUs,
          u.stacked
        ].filter(Boolean).join(" ")
      ).join(" ");

      return [
        row.customerName,
        row.customerEmail,
        row.customerPhone,
        row.gateCode,
        row.contactMethod,
        row.purchaseDate,
        row.problemDescription,
        row.queueStatus,
        row.queueStatusNotes,
        row.erpOrderNumber,
        formatAddress(row.serviceAddress),
        unitText
      ].join(" ").toLowerCase();
    }

    function attachCopyActions() {
      document.querySelectorAll("[data-copy-value]").forEach((btn) => {
        btn.addEventListener("click", async () => {
          const value = btn.getAttribute("data-copy-value");
          const originalText = btn.textContent;

          try {
            await navigator.clipboard.writeText(value);
            btn.textContent = "Copied";
            setTimeout(() => {
              btn.textContent = originalText;
            }, 1200);
          } catch {
            btn.textContent = "Failed";
            setTimeout(() => {
              btn.textContent = originalText;
            }, 1200);
          }
        });
      });
    }

    function buildRowMarkup(row) {
      const card = cardLabel(row);
      const queueStatus = row.queueStatus || "Call Scheduled";

      return `
        <tr>
          <td>
            <div class="strong">${formatDate(row.createdAt)}</div>
            <div class="small muted">Updated: ${formatDate(row.updatedAt)}</div>
          </td>

          <td>${queueBadge(queueStatus)}</td>

          <td>
            <div class="strong">${escapeHtml(row.customerName || "-")}</div>
            <div>${escapeHtml(row.customerEmail || "-")}</div>
            <div>${escapeHtml(row.customerPhone || "-")}</div>
          </td>

          <td>
            <div class="strong">${escapeHtml(formatAddress(row.serviceAddress))}</div>
            <div class="small">
              Gate code: ${escapeHtml(row.gateCode || "-")}<br>
              Contact method: ${escapeHtml(row.contactMethod || "-")}<br>
              Purchase date: ${escapeHtml(row.purchaseDate || "-")}<br>
              Purchased within 12 months: ${escapeHtml(row.purchasedWithin12Months || "-")}
            </div>
          </td>

          <td>
            <div class="small">
              <span class="strong">ERP order:</span> ${escapeHtml(row.erpOrderNumber || "-")}<br>
              <span class="strong">Queue note:</span> ${escapeHtml(row.queueStatusNotes || "-")}
            </div>
            <div style="margin-top:10px;">
              ${formatUnits(row.units || [])}
            </div>
          </td>

          <td>
            <div><span class="${card.className}">${escapeHtml(card.text)}</span></div>
            <div class="small muted" style="margin-top:8px;">
              Setup status: ${escapeHtml(row.setupIntentStatus || "-")}
            </div>
          </td>

          <td>
            <div class="mono">
              <div class="copy-ref-row">
                <span class="copy-ref-label">SetupIntent:</span>
                <span class="copy-ref-value">${escapeHtml(row.setupIntentId || "-")}</span>
                ${row.setupIntentId ? `<button class="copy-ref-btn" type="button" data-copy-value="${escapeHtml(row.setupIntentId)}">Copy</button>` : ""}
              </div>
            </div>
          </td>
        </tr>
      `;
    }

    function render() {
      const search = searchFilter.value.trim().toLowerCase();
      const statusMode = statusFilter.value;
      const cardMode = cardFilter.value;

      const filtered = allRows.filter((row) => {
        const haystack = buildSearchHaystack(row);
        const matchesSearch = !search || haystack.includes(search);
        const matchesStatus = statusMode === "all" || (row.queueStatus || "Call Scheduled") === statusMode;
        const matchesCard = cardMode === "all" || cardState(row) === cardMode;
        return matchesSearch && matchesStatus && matchesCard;
      });

      if (!filtered.length) {
        tableBody.innerHTML = `<tr><td colspan="7" class="empty">No archived service requests found.</td></tr>`;
      } else {
        tableBody.innerHTML = filtered.map(buildRowMarkup).join("");
      }

      attachCopyActions();
    }

    async function loadRows() {
      try {
        const res = await fetch("/api/service-cards/archive");
        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.error || "Unable to load archived service requests.");
        }

        allRows = Array.isArray(data.rows) ? data.rows : [];
        render();
      } catch (err) {
        tableBody.innerHTML = `<tr><td colspan="7" class="empty">Error loading archived service requests: ${err.message}</td></tr>`;
      }
    }

    searchFilter.addEventListener("input", render);
    statusFilter.addEventListener("change", render);
    cardFilter.addEventListener("change", render);

    loadRows();
  </script>
</body>
</html>
