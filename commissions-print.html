<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex,nofollow,noarchive" />
  <title>Wilson AC & Appliance - Commission Print View</title>
  <style>
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f7fb;
      color: #1f2937;
      padding: 24px;
    }

    .wrap {
      max-width: 1180px;
      margin: 0 auto;
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .toolbar button, .toolbar a {
      appearance: none;
      border: none;
      background: #635bff;
      color: #fff;
      text-decoration: none;
      padding: 12px 16px;
      border-radius: 10px;
      font-weight: 700;
      cursor: pointer;
    }

    .toolbar .secondary {
      background: #e5e7eb;
      color: #111827;
    }

    .sheet {
      background: #fff;
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 10px 35px rgba(0, 0, 0, 0.08);
    }

    h1, h2, h3 {
      margin: 0;
    }

    h1 {
      font-size: 58px;
      margin-bottom: 8px;
      line-height: 1;
    }

    h2 {
      font-size: 24px;
      margin: 24px 0 12px;
    }

    h3 {
      font-size: 18px;
      margin-bottom: 8px;
    }

    p {
      margin: 0;
      color: #6b7280;
      line-height: 1.6;
    }

    .eyebrow {
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-weight: 900;
      color: #111827;
      margin-bottom: 6px;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
      margin: 20px 0 24px;
    }

    .summary-card {
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 14px;
      background: #fafbff;
    }

    .summary-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 800;
      color: #64748b;
      margin-bottom: 8px;
    }

    .summary-value {
      font-size: 28px;
      font-weight: 900;
      line-height: 1;
      margin-bottom: 6px;
    }

    .summary-subvalue {
      font-size: 13px;
      color: #475569;
      line-height: 1.5;
    }

    .group {
      margin-top: 22px;
      border-top: 1px solid #e5e7eb;
      padding-top: 18px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      font-size: 13px;
    }

    th, td {
      padding: 10px 8px;
      border-bottom: 1px solid #edf2f7;
      text-align: left;
      vertical-align: top;
    }

    th {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #64748b;
      background: #fafbff;
    }

    .money, .number, .percent {
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .muted {
      color: #6b7280;
      font-size: 13px;
    }

    .empty {
      padding: 40px 0;
      color: #6b7280;
      text-align: center;
    }

    @media print {
      body {
        background: #fff;
        padding: 0;
      }

      .toolbar {
        display: none;
      }

      .sheet {
        box-shadow: none;
        border-radius: 0;
        padding: 0;
      }
    }

    @media (max-width: 900px) {
      .summary {
        grid-template-columns: 1fr 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="toolbar">
      <div class="muted">Use your browser's print dialog to save this report as PDF.</div>
      <div>
        <a id="backToCommissionsLink" class="secondary" href="commissions.html?view=appliance">Back to Commissions</a>
        <button id="printBtn" type="button">Print / Save PDF</button>
      </div>
    </div>

    <div class="sheet">
      <div id="content" class="empty">Loading commission run...</div>
    </div>
  </div>

  <script>
    const content = document.getElementById("content");
    const printBtn = document.getElementById("printBtn");
    const backToCommissionsLink = document.getElementById("backToCommissionsLink");

    function formatMoney(value) {
      return new Intl.NumberFormat("en-US", {
        style: "currency",
        currency: "USD"
      }).format(Number(value || 0));
    }

    function formatPercent(value) {
      return `${Number(value || 0).toFixed(2)}%`;
    }

    function getGroupPlan(group) {
      return String(group?.salespersonPlan || "").trim();
    }

    function groupShowsProtect(group) {
      const plan = getGroupPlan(group);
      return plan === "Showroom Consultant" ||
        plan === "Field Sales Consultant" ||
        (!plan && String(group?.salespersonDepartment || "").trim().toLowerCase() === "appliance");
    }

    function getWarrantySummaryText(group) {
      if (!groupShowsProtect(group)) {
        return "";
      }

      return `Protect % ${formatPercent(group.warrantyPenetrationPercent || 0)} @ ${formatPercent(group.warrantyPayoutPercent || 0)}`;
    }

    function isProtectLine(line) {
      const type = String(line?.lineType || "").trim().toLowerCase();
      return type === "wty" || type === "warranty" || type === "protect";
    }

    function isHvacSalesGroup(group) {
      const plan = getGroupPlan(group);
      if (plan) {
        return plan === "HVAC Selling Technician";
      }
      return String(group?.salespersonDepartment || "").trim().toLowerCase() === "hvac sales";
    }

    function getDisplayLineType(line) {
      return isProtectLine(line) ? "Protect" : (line.lineType || "");
    }

    function isUnpaidLine(line) {
      return String(line?.sourceClassification || "").trim().toUpperCase() === "UNPAID";
    }

    function getDisplayCommissionPercent(line, group) {
      if (isUnpaidLine(line)) {
        return 0;
      }
      if (isProtectLine(line)) {
        return Number(group?.warrantyPayoutPercent || 0);
      }
      return Number(line?.commissionPercent || 0);
    }

    function getDisplayCommissionAmount(line, group) {
      if (isUnpaidLine(line)) {
        return 0;
      }
      if (isProtectLine(line)) {
        return Number(line?.sellPrice || 0) * (Number(group?.warrantyPayoutPercent || 0) / 100);
      }
      return Number(line?.commissionAmount || 0);
    }

    function getIncludedLines(group) {
      return (group.lines || []).filter((line) => String(line.sourceClassification || "").trim().toUpperCase() !== "OMIT");
    }

    function getDisplayedCommissionAmount(group) {
      return formatMoney(Number(group.totalPayoutAmount || group.totalCommissionAmount || 0));
    }

    function getProductCommissionAmount(group) {
      return Number(group?.totalCommissionAmount || 0);
    }

    function getProtectSummaryLine(group) {
      if (!groupShowsProtect(group)) {
        return "No Protect payout in this export";
      }

      const bonusText = Number(group.protectBonusAmount || 0) > 0
        ? ` | ${formatMoney(group.protectBonusAmount)} bonus`
        : "";
      return `${formatMoney(group.warrantySellPrice || 0)} Protect sales | ${formatPercent(group.warrantyPenetrationPercent || 0)} Protect % | ${formatMoney(group.warrantyPayoutAmount || 0)} payout${bonusText}`;
    }

    function getPlanSummaryLine(group) {
      const plan = getGroupPlan(group);
      if (!plan) {
        return "";
      }
      const bits = [plan];
      if (Number(group.protectBonusAmount || 0) > 0) {
        bits.push(`Protect bonus ${formatMoney(group.protectBonusAmount)}`);
      }
      if (group.fsUnqualified) {
        bits.push("NOT QUALIFIED — plan payout withheld ($500k/6-month minimum)");
      }
      return bits.join(" | ");
    }

    function getAdjustmentSummaryLine(group) {
      const adjustments = (group.adjustments || []).filter((adjustment) => Number(adjustment.amount || 0) !== 0 || String(adjustment.comment || "").trim());
      if (!adjustments.length) {
        return "";
      }

      return adjustments.map((adjustment) => {
        const signedAmount = ["DEDUCT", "ADVANCE"].includes(String(adjustment.adjustmentType || "").toUpperCase())
          ? -Math.abs(Number(adjustment.amount || 0))
          : Math.abs(Number(adjustment.amount || 0));
        const signPrefix = signedAmount < 0 ? "-" : "+";
        const amountText = formatMoney(Math.abs(signedAmount));
        const commentText = String(adjustment.comment || "").trim();
        return `${adjustment.adjustmentType} ${signPrefix}${amountText}${commentText ? ` — ${commentText}` : ""}`;
      }).join(" | ");
    }

    function getStatusLabel(status) {
      if (status === "locked") return "Locked";
      if (status === "final_paid") return "Final / Paid";
      return "Draft";
    }

    async function loadRun() {
      const params = new URLSearchParams(window.location.search);
      const runId = params.get("run");
      const salespersonKey = params.get("salesperson") || "";
      const view = String(params.get("view") || "appliance").trim().toLowerCase();
      backToCommissionsLink.href = `commissions.html?view=${encodeURIComponent(view)}`;

      if (!runId) {
        content.textContent = "No commission run was specified.";
        return;
      }

      try {
        const snapshotRaw = window.localStorage.getItem("commissionPrintSnapshot");
        if (snapshotRaw) {
          const snapshot = JSON.parse(snapshotRaw);
          if (snapshot?.runId === runId && snapshot?.detail) {
            const requestedSalespersonKey = salespersonKey || "";
            const snapshotSalespersonKey = snapshot.salespersonKey || "";
            if (!requestedSalespersonKey || requestedSalespersonKey === snapshotSalespersonKey) {
              renderRun(snapshot.detail, requestedSalespersonKey);
              return;
            }
          }
        }
      } catch (error) {
        console.warn("Unable to load commission print snapshot.", error);
      }

      const res = await fetch(`/api/commissions/runs/${encodeURIComponent(runId)}`, { cache: "no-store" });
      const data = await res.json();

      if (!res.ok) {
        throw new Error(data.error || "Unable to load commission run.");
      }

      renderRun(data, salespersonKey);
    }

    function renderRun(data, salespersonKey = "") {
      const { run, summary, salespeople } = data;
      const filteredSalespeople = salespersonKey
        ? salespeople.filter((group) => (group.salespersonCode || group.salespersonName || "UNKNOWN") === salespersonKey)
        : salespeople;
      const filteredSummary = filteredSalespeople.reduce((totals, group) => {
        totals.salespersonCount += 1;
        totals.lineCount += Number(group.lineCount || 0);
        totals.totalSellPrice += Number(group.totalSellPrice || 0);
        totals.totalProductCommissionAmount += Number(group.totalCommissionAmount || 0);
        totals.totalProtectSales += Number(group.warrantySellPrice || 0);
        totals.totalProtectPayoutAmount += Number(group.warrantyPayoutAmount || 0);
        totals.totalApplianceSalesRevenue += Number(group.applianceSalesRevenue || 0);
        totals.totalPayoutAmount += Number(group.totalPayoutAmount || group.totalCommissionAmount || 0);
        return totals;
      }, {
        salespersonCount: 0,
        lineCount: 0,
        totalSellPrice: 0,
        totalProductCommissionAmount: 0,
        totalProtectSales: 0,
        totalProtectPayoutAmount: 0,
        totalApplianceSalesRevenue: 0,
        totalPayoutAmount: 0
      });

      const selectedGroup = filteredSalespeople.length === 1 ? filteredSalespeople[0] : null;
      const aggregatedProtectPercent = filteredSummary.totalApplianceSalesRevenue > 0
        ? (filteredSummary.totalProtectSales / filteredSummary.totalApplianceSalesRevenue) * 100
        : 0;
      const printTitle = selectedGroup?.salespersonName || "Commission Report";
      const printEyebrow = selectedGroup
        ? `${selectedGroup.salespersonName || selectedGroup.salespersonCode} - ${run.periodLabel}`
        : `Commission Report - ${run.periodLabel}`;

      content.className = "";
      content.innerHTML = `
        <div class="eyebrow">${printEyebrow}</div>
        <h1>${run.periodLabel}</h1>
        <div class="summary">
          <div class="summary-card">
            <div class="summary-label">Total Sales</div>
            <div class="summary-value">${formatMoney(filteredSummary.totalSellPrice)}</div>
            <div class="muted">Visible gross sales in this export</div>
          </div>
          <div class="summary-card">
            <div class="summary-label">Product Commission</div>
            <div class="summary-value">${formatMoney(selectedGroup ? getProductCommissionAmount(selectedGroup) : filteredSummary.totalProductCommissionAmount)}</div>
            <div class="muted">${filteredSummary.lineCount} imported detail lines</div>
          </div>
          <div class="summary-card">
            <div class="summary-label">Protect Summary</div>
            <div class="summary-value">${formatMoney(selectedGroup ? (selectedGroup.warrantyPayoutAmount || 0) : filteredSummary.totalProtectPayoutAmount)}</div>
            <div class="summary-subvalue">${selectedGroup ? getProtectSummaryLine(selectedGroup) : `${formatMoney(filteredSummary.totalProtectSales)} Protect sales | ${formatPercent(aggregatedProtectPercent)} Protect % | ${formatMoney(filteredSummary.totalProtectPayoutAmount)} payout`}</div>
          </div>
          <div class="summary-card">
            <div class="summary-label">Commission</div>
            <div class="summary-value">${formatMoney(filteredSummary.totalPayoutAmount || 0)}</div>
            <div class="muted">Current expected payout</div>
          </div>
        </div>
        ${filteredSalespeople.map((group) => {
          const includedLines = getIncludedLines(group);
          const isHvac = isHvacSalesGroup(group);
          return `
          <div class="group">
            <h2>${group.salespersonName || group.salespersonCode} ${group.salespersonCode ? `| ${group.salespersonCode}` : ""}</h2>
            <p>${group.orderCount} orders | ${group.lineCount} lines | ${getDisplayedCommissionAmount(group)} commission${getWarrantySummaryText(group) ? ` | ${getWarrantySummaryText(group)}` : ""}</p>
            ${getPlanSummaryLine(group) ? `<p class="muted" style="margin-top:6px;">${getPlanSummaryLine(group)}</p>` : ""}
            <table>
              <thead>
                <tr>
                  ${isHvac ? `
                    <th>Sales Order</th>
                    <th>Customer</th>
                    <th class="money">Product $</th>
                    <th class="money">Protect $</th>
                    <th class="money">Labor $</th>
                    <th class="money">Discounts $</th>
                    <th class="money">COGS $</th>
                    <th class="percent">Overhead %</th>
                    <th class="percent">Gross Margin %</th>
                    <th class="percent">Net Margin %</th>
                    <th class="percent">Payout Rate</th>
                    <th class="money">Commission $</th>
                  ` : `
                    <th>Sales Order</th>
                    <th>Customer</th>
                    <th>Line Type</th>
                    <th>Model</th>
                    <th>Serial</th>
                    <th class="number">Qty</th>
                    <th class="money">Sell Price</th>
                    <th class="percent">GM %</th>
                    <th class="percent">Commission %</th>
                    <th class="money">Commission $</th>
                  `}
                </tr>
              </thead>
              <tbody>
                ${isHvac
                  ? (group.salesOrders || []).map((order) => `
                      <tr>
                        <td>${order.displaySalesOrder || order.salesOrder || order.orderKey || ""}</td>
                        <td>${order.customerName || ""}</td>
                        <td class="money">${formatMoney(order.productRevenue || 0)}</td>
                        <td class="money">${formatMoney(order.protectRevenue || 0)}</td>
                        <td class="money">${formatMoney(order.laborAmount || 0)}</td>
                        <td class="money">${formatMoney(order.discountsAmount || 0)}</td>
                        <td class="money">${formatMoney(order.cogsAmount || 0)}</td>
                        <td class="percent">${formatPercent(order.overheadPercent || 0)}</td>
                        <td class="percent">${formatPercent(order.grossMarginPercent || 0)}</td>
                        <td class="percent">${formatPercent(order.netMarginPercent || 0)}</td>
                        <td class="percent">${formatPercent(order.payoutRate || 0)}</td>
                        <td class="money">${formatMoney(order.payoutAmount || 0)}</td>
                      </tr>
                    `).join("")
                  : includedLines.map((line) => `
                      <tr>
                        <td>${line.salesOrder || ""}</td>
                        <td>${line.customerName || ""}</td>
                        <td>${getDisplayLineType(line)}</td>
                        <td>${line.productModel || ""}</td>
                        <td>${line.sourceClassification || ""}</td>
                        <td class="number">${Number(line.quantity || 0).toFixed(2).replace(/\.00$/, "")}</td>
                        <td class="money">${formatMoney(line.sellPrice || 0)}</td>
                        <td class="percent">${isProtectLine(line) || !Number(line.gmPercent || 0) ? "" : formatPercent(line.gmPercent)}</td>
                        <td class="percent">${formatPercent(getDisplayCommissionPercent(line, group))}</td>
                        <td class="money">${formatMoney(getDisplayCommissionAmount(line, group))}</td>
                      </tr>
                    `).join("")}
              </tbody>
            </table>
            ${getAdjustmentSummaryLine(group) ? `<p class="muted" style="margin-top:12px;"><strong>Adjustments:</strong> ${getAdjustmentSummaryLine(group)}</p>` : ""}
            ${Number(group.unpaidLineCount || 0) > 0 ? `<p class="muted" style="margin-top:10px;"><strong>UNPAID:</strong> ${group.unpaidLineCount} line${Number(group.unpaidLineCount || 0) === 1 ? "" : "s"} totaling ${formatMoney(group.excludedCommissionAmount || 0)} are excluded from this payout and will be paid when the balance is collected.</p>` : ""}
          </div>
        `;
        }).join("")}
      `;
    }

    printBtn.addEventListener("click", () => {
      window.print();
    });

    loadRun().catch((error) => {
      content.textContent = error.message;
    });
  </script>
</body>
</html>
