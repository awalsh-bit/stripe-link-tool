<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex,nofollow,noarchive" />
  <title>Wilson AC & Appliance - Commissions</title>
  <link rel="stylesheet" href="internal-shell.css" />
  <style>
    :root {
      --bg: #f7f8fc;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #dbe1ea;
      --primary: #635bff;
      --shadow: 0 10px 35px rgba(0, 0, 0, 0.08);
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #eef2ff 0%, var(--bg) 100%);
      color: var(--text);
      min-height: 100vh;
      padding: 32px 16px;
    }

    .wrap {
      max-width: 1480px;
      margin: 0 auto;
    }

    .card {
      max-width: 980px;
      margin: 0 auto;
      background: var(--card);
      border: 1px solid rgba(99, 91, 255, 0.12);
      box-shadow: var(--shadow);
      border-radius: var(--radius);
      padding: 28px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 0 12px;
      border-radius: 999px;
      background: rgba(99, 91, 255, 0.1);
      color: var(--primary);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(32px, 4vw, 52px);
      line-height: 1.05;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.7;
    }
  </style>
</head>
<body data-shell-label="Commissions" data-shell-icon="commissions">
  <div class="wrap">
    <div id="internal-shell-header"></div>
    <div class="card">
      <div class="eyebrow">Executive Access</div>
      <h1>Commissions</h1>
      <p>This page is reserved for executive sessions. We can build the commissions workflow here next without exposing it to the rest of the shared dashboard login.</p>
    </div>
    <div id="internal-shell-footer"></div>
  </div>

  <script src="internal-shell.js"></script>
</body>
</html>
