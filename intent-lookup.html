<!DOCTYPE html>
<html lang="en">
<meta name="robots" content="noindex,nofollow,noarchive">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wilson AC & Appliance - Issue Refund</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="stylesheet" href="internal-shell.css" />
  <style>
    :root {
      --bg: #f7f8fc;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #dbe1ea;
      --primary: #635bff;
      --primary-hover: #564ef0;
      --shadow: 0 10px 35px rgba(0, 0, 0, 0.08);
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #eef2ff 0%, var(--bg) 100%);
      color: var(--text);
      min-height: 100vh;
      padding: 32px 16px;
    }

    .wrap {
      max-width: 1480px;
      margin: 0 auto;
    }

    .card {
      background: var(--card);
      border: 1px solid rgba(99, 91, 255, 0.12);
      box-shadow: var(--shadow);
      border-radius: var(--radius);
      padding: 22px;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 180px minmax(0, 1fr) auto;
      gap: 12px;
      align-items: end;
      margin-bottom: 16px;
    }

    .toolbar-actions {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      font-weight: 700;
      margin-bottom: 8px;
    }

    select,
    input,
    button {
      font: inherit;
    }

    select,
    input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      background: #fff;
      color: var(--text);
      outline: none;
    }

    select:focus,
    input:focus {
      border-color: rgba(99, 91, 255, 0.75);
      box-shadow: 0 0 0 4px rgba(99, 91, 255, 0.12);
    }

    .btn {
      appearance: none;
      border: 1px solid transparent;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.12s ease, border-color 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn-primary {
      background: var(--primary);
      color: #fff;
    }

    .btn-primary:hover {
      background: var(--primary-hover);
    }

    .btn-secondary {
      background: #fff;
      color: var(--text);
      border-color: var(--border);
    }

    .status {
      min-height: 24px;
      margin-bottom: 14px;
      font-size: 14px;
      color: var(--muted);
    }

    .status.error {
      color: #b91c1c;
    }

    .status.success {
      color: #166534;
    }

    .helper {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
      margin-bottom: 18px;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-bottom: 20px;
    }

    .summary-card {
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      background: #fafbff;
    }

    .summary-title {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      font-weight: 700;
      margin-bottom: 12px;
    }

    .summary-list {
      display: grid;
      gap: 10px;
    }

    .summary-row {
      display: grid;
      grid-template-columns: 180px minmax(0, 1fr);
      gap: 12px;
      align-items: start;
    }

    .summary-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      font-weight: 700;
    }

    .summary-value {
      font-size: 14px;
      line-height: 1.5;
      word-break: break-word;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      text-align: left;
      padding: 14px 10px;
      border-bottom: 1px solid #edf1f7;
      vertical-align: middle;
      font-size: 14px;
    }

    th {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }

    .amount {
      font-weight: 800;
      white-space: nowrap;
    }

    .empty {
      color: var(--muted);
      padding: 18px 0 6px;
    }

    .customer-message {
      display: none;
      border: 1px solid rgba(99, 91, 255, 0.18);
      border-radius: 16px;
      padding: 16px;
      background: #f8faff;
      margin-bottom: 20px;
    }

    .customer-message.show {
      display: block;
    }

    .customer-message-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .customer-message-title {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      font-weight: 700;
    }

    .customer-message-text {
      white-space: pre-wrap;
      line-height: 1.6;
      font-size: 14px;
    }

    .finder {
      margin: 12px 0 4px;
      border: 1px dashed var(--border, #dbe1ea);
      border-radius: 12px;
      padding: 12px 14px;
      background: #fbfcff;
    }

    .finder-row { display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; }
    .finder-field { flex: 1 1 260px; }
    .finder-field label { display: block; margin-bottom: 6px; font-size: 13px; font-weight: 700; }
    .finder-field input { width: 100%; }

    .finder-results { margin-top: 10px; display: grid; gap: 8px; }

    .finder-hit {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      border: 1px solid var(--border, #dbe1ea);
      border-radius: 10px;
      padding: 10px 12px;
      background: #fff;
      font-size: 13px;
    }

    .finder-hit .hit-main { flex: 1 1 240px; }
    .finder-hit .hit-main strong { display: block; font-size: 14px; }
    .finder-hit .hit-meta { color: #6b7280; }

    .refund-panel {
      margin: 14px 0 4px;
      border: 1px solid rgba(245, 158, 11, 0.5);
      background: #fffbeb;
      border-radius: 14px;
      padding: 16px;
    }

    .refund-panel-title { font-weight: 800; font-size: 15px; margin-bottom: 12px; }

    .refund-grid {
      display: grid;
      grid-template-columns: 180px 1fr;
      gap: 14px;
      align-items: start;
    }

    .refund-panel label { display: block; margin-bottom: 6px; font-size: 13px; font-weight: 700; }
    .refund-panel input[type="number"], .refund-panel input[type="text"] { width: 100%; }

    .refund-confirm {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      margin-top: 14px;
      font-size: 14px;
      line-height: 1.5;
      font-weight: 500 !important;
      cursor: pointer;
    }

    .refund-confirm input { width: auto; margin-top: 3px; }

    .refund-actions { display: flex; gap: 10px; margin-top: 14px; flex-wrap: wrap; }

    @media (max-width: 720px) {
      .refund-grid { grid-template-columns: 1fr; }
      .refund-actions .btn { flex: 1 1 auto; }
    }

    @media (max-width: 1100px) {
      .summary-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 900px) {
      .toolbar {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 700px) {
      .summary-row {
        grid-template-columns: 1fr;
      }

      table,
      thead,
      tbody,
      tr,
      th,
      td {
        display: block;
        width: 100%;
      }

      thead {
        display: none;
      }

      tbody {
        display: grid;
        gap: 12px;
      }

      tr {
        border: 1px solid #e5e7eb;
        border-radius: 16px;
        padding: 6px 0;
        background: #fff;
        box-shadow: 0 6px 18px rgba(15, 23, 42, 0.04);
      }

      td {
        border-bottom: 1px solid #edf1f7;
        padding: 10px 14px;
      }

      td:last-child {
        border-bottom: none;
      }

      td::before {
        content: attr(data-label);
        display: block;
        margin-bottom: 4px;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
      }
    }
  </style>
</head>
<body data-shell-label="Issue Refund" data-shell-icon="lookup">
  <div class="wrap">
    <div id="internal-shell-header"></div>
    <div class="card">
      <div class="toolbar">
        <div>
          <label for="intentKind">Intent Type</label>
          <select id="intentKind">
            <option value="auto">Auto-detect</option>
            <option value="payment_intent">PaymentIntent</option>
            <option value="setup_intent">SetupIntent</option>
          </select>
        </div>

        <div>
          <label for="intentId">Intent ID</label>
          <input id="intentId" placeholder="pi_... or seti_..." />
        </div>

        <button id="lookupBtn" class="btn btn-primary" type="button">Look up</button>
      </div>

      <div class="finder">
        <div class="finder-row">
          <div class="finder-field">
            <label for="finderQuery">Don't have the ID? Find by customer</label>
            <input id="finderQuery" placeholder="Phone number, email, or name" />
          </div>
          <button id="finderBtn" class="btn btn-secondary" type="button">Find payments</button>
        </div>
        <div id="finderResults" class="finder-results" hidden></div>
      </div>

      <div class="toolbar-actions">
        <button id="refundBtn" class="btn btn-secondary" type="button" hidden>Issue refund</button>
        <button id="exportCsvBtn" class="btn btn-secondary" type="button">Export visible to CSV</button>
      </div>

      <div id="refundPanel" class="refund-panel" hidden>
        <div class="refund-panel-title">Issue a refund</div>
        <div class="refund-grid">
          <div>
            <label for="refundAmount">Refund amount ($)</label>
            <input id="refundAmount" type="number" min="0" step="0.01" value="0.00" />
            <div class="helper" id="refundMaxNote"></div>
          </div>
          <div class="refund-note-field">
            <label for="refundNote">Product or service cancelled / returned</label>
            <input id="refundNote" type="text" maxlength="200"
              placeholder='e.g. "KDTS434SPS dishwasher returned" or "canceled HVAC maintenance visit"' />
          </div>
        </div>
        <label class="refund-confirm">
          <input id="refundConfirm" type="checkbox" />
          <span>I understand this process <strong>cannot be reversed once submitted</strong>, and
          Wilson Appliance will need to pay additional credit card fees to re-collect from the
          customer at a later time.</span>
        </label>
        <div class="refund-actions">
          <button id="refundSubmitBtn" class="btn btn-primary" type="button" disabled>Submit refund</button>
          <button id="refundCancelBtn" class="btn btn-secondary" type="button">Cancel</button>
        </div>
      </div>

      <div id="status" class="status"></div>
      <div id="helperText" class="helper">
        Enter a PaymentIntent or SetupIntent ID to see the customer, employee, date, amount, and status history in a more readable format.
      </div>

      <div class="summary-grid">
        <div class="summary-card">
          <div class="summary-title">Summary</div>
          <div class="summary-list" id="summaryPrimary">
            <div class="summary-row">
              <div class="summary-label">Status</div>
              <div class="summary-value">No intent loaded yet.</div>
            </div>
          </div>
        </div>

        <div class="summary-card">
          <div class="summary-title">Dates And Amounts</div>
          <div class="summary-list" id="summaryDates">
            <div class="summary-row">
              <div class="summary-label">Sent</div>
              <div class="summary-value">-</div>
            </div>
          </div>
        </div>
      </div>

      <div id="customerMessagePanel" class="customer-message">
        <div class="customer-message-header">
          <div class="customer-message-title">Customer Message</div>
          <button id="copyCustomerMessageBtn" class="btn btn-secondary" type="button">Copy message</button>
        </div>
        <div id="customerMessageText" class="customer-message-text"></div>
      </div>

      <table>
        <thead>
          <tr>
            <th>Date</th>
            <th>Event</th>
            <th>Amount</th>
            <th>Reason</th>
          </tr>
        </thead>
        <tbody id="eventsTableBody">
          <tr><td colspan="4" class="empty">Awaiting lookup...</td></tr>
        </tbody>
      </table>
    </div>
    <div id="internal-shell-footer"></div>
  </div>

  <script src="internal-shell.js"></script>
  <script>
    const intentKindEl = document.getElementById("intentKind");
    const intentIdEl = document.getElementById("intentId");
    const lookupBtn = document.getElementById("lookupBtn");
    const refundBtn = document.getElementById("refundBtn");
    const exportCsvBtn = document.getElementById("exportCsvBtn");
    const copyCustomerMessageBtn = document.getElementById("copyCustomerMessageBtn");
    const statusEl = document.getElementById("status");
    const helperTextEl = document.getElementById("helperText");
    const summaryPrimaryEl = document.getElementById("summaryPrimary");
    const summaryDatesEl = document.getElementById("summaryDates");
    const eventsTableBody = document.getElementById("eventsTableBody");
    const customerMessagePanel = document.getElementById("customerMessagePanel");
    const customerMessageText = document.getElementById("customerMessageText");

    let latestIntentResponse = null;

    function showStatus(type, message) {
      statusEl.className = `status ${type}`;
      statusEl.textContent = message;
    }

    function clearStatus() {
      statusEl.className = "status";
      statusEl.textContent = "";
    }

    function isRefundablePaymentIntent(response) {
      if (!response || response.kind !== "payment_intent") {
        return false;
      }

      const summary = response.summary || {};
      return summary.intentStatus === "succeeded" && Number(summary.refundableAmount || 0) > 0;
    }

    function formatMoney(value) {
      return new Intl.NumberFormat("en-US", {
        style: "currency",
        currency: "USD"
      }).format(value || 0);
    }

    function formatDate(isoValue) {
      if (!isoValue) return "-";

      return new Date(isoValue).toLocaleString("en-US", {
        month: "2-digit",
        day: "2-digit",
        year: "2-digit",
        hour: "numeric",
        minute: "2-digit"
      });
    }

    function renderSummaryRows(target, rows) {
      target.innerHTML = rows.map((row) => `
        <div class="summary-row">
          <div class="summary-label">${row.label}</div>
          <div class="summary-value">${row.value}</div>
        </div>
      `).join("");
    }

    function escapeCsv(value) {
      const stringValue = String(value ?? "");
      if (/[",\n]/.test(stringValue)) {
        return `"${stringValue.replace(/"/g, '""')}"`;
      }
      return stringValue;
    }

    function downloadCsv() {
      if (!latestIntentResponse) {
        showStatus("error", "There is no loaded intent to export yet.");
        return;
      }

      const rows = [
        ["Kind", latestIntentResponse.kind],
        ["Intent ID", latestIntentResponse.id],
        ...Object.entries(latestIntentResponse.summary || {}).map(([key, value]) => [key, value]),
        ...(latestIntentResponse.customerMessage ? [["Customer Message", latestIntentResponse.customerMessage]] : []),
        ...((latestIntentResponse.events || []).flatMap((event, index) => ([
          [`Event ${index + 1} Date`, event.date || ""],
          [`Event ${index + 1} Label`, event.label || ""],
          [`Event ${index + 1} Amount`, event.amount || 0],
          [`Event ${index + 1} Reason`, event.reason || ""]
        ])))
      ];

      const lines = [
        "Field,Value",
        ...rows.map(([field, value]) => [field, value].map(escapeCsv).join(","))
      ];

      const blob = new Blob([lines.join("\r\n")], { type: "text/csv;charset=utf-8;" });
      const link = document.createElement("a");
      const id = String(latestIntentResponse.id || "intent").replace(/[^a-z0-9_-]+/gi, "_");
      link.href = URL.createObjectURL(blob);
      link.download = `intent-lookup_${id}.csv`;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(link.href);
    }

    function renderLookup(response) {
      latestIntentResponse = response;
      helperTextEl.textContent = `${response.kind === "payment_intent" ? "PaymentIntent" : "SetupIntent"} ${response.id}`;

      renderSummaryRows(summaryPrimaryEl, [
        { label: "Employee Name", value: response.summary.employeeName || "-" },
        { label: "Customer Name", value: response.summary.customerName || "-" },
        { label: "Customer Email", value: response.summary.customerEmail || "-" },
        { label: "Customer Phone", value: response.summary.customerPhone || "-" },
        { label: "Sales Order", value: response.summary.salesOrder || "-" },
        { label: "Description", value: response.summary.description || "-" },
        { label: "Status", value: response.summary.intentStatus || "-" },
        { label: "Payment Method", value: response.summary.paymentMethod || "-" }
      ]);

      renderSummaryRows(summaryDatesEl, [
        { label: "Sent", value: formatDate(response.summary.sentDate) },
        { label: "Paid", value: formatDate(response.summary.paidDate) },
        { label: "Requested Amount", value: formatMoney(response.summary.requestedAmount || 0) },
        { label: "Paid Amount", value: formatMoney(response.summary.paidAmount || 0) },
        { label: "Refunded Amount", value: formatMoney(response.summary.refundedAmount || 0) },
        { label: "Refundable Amount", value: formatMoney(response.summary.refundableAmount || 0) },
        { label: "Fee Amount", value: formatMoney(response.summary.feeAmount || 0) },
        { label: "Net Amount", value: formatMoney(response.summary.netAmount || 0) },
        { label: "Customer ID", value: response.summary.customerId || "-" },
        { label: "Payment Method ID", value: response.summary.paymentMethodId || "-" }
      ]);

      refundBtn.hidden = !isRefundablePaymentIntent(response);
      const customerMessage = String(response.customerMessage || "").trim();
      customerMessagePanel.classList.toggle("show", Boolean(customerMessage));
      customerMessageText.textContent = customerMessage;

      const events = response.events || [];
      if (!events.length) {
        eventsTableBody.innerHTML = `<tr><td colspan="4" class="empty">No dated events found for this intent.</td></tr>`;
        return;
      }

      eventsTableBody.innerHTML = events.map((event) => `
        <tr>
          <td data-label="Date">${formatDate(event.date)}</td>
          <td data-label="Event">${event.label || "-"}</td>
          <td data-label="Amount" class="amount">${event.amount ? formatMoney(event.amount) : "-"}</td>
          <td data-label="Reason">${event.reason || "-"}</td>
        </tr>
      `).join("");
    }

    const refundPanel = document.getElementById("refundPanel");
    const refundAmountEl = document.getElementById("refundAmount");
    const refundNoteEl = document.getElementById("refundNote");
    const refundConfirmEl = document.getElementById("refundConfirm");
    const refundSubmitBtn = document.getElementById("refundSubmitBtn");
    const refundCancelBtn = document.getElementById("refundCancelBtn");

    // Mirrors the server's rule: the note must identify the product or
    // service — generic phrases are rejected.
    const GENERIC_REFUND_NOTES = /^(requested by( the)? customer|customer request(ed)?( it)?( a refund)?|per( the)? customer( request)?|customer( asked)?( for( a)? refund)?|refund( requested)?|return(ed)?|cancell?ed|cancellation|cancel|n\/?a|none|misc|other|test)[.!]*$/i;

    function refundNoteError(note) {
      const trimmed = String(note || "").trim();
      if (trimmed.length < 8 || GENERIC_REFUND_NOTES.test(trimmed)) {
        return 'Be specific about the product or service being refunded (e.g. "KDTS434SPS dishwasher returned" or "canceled HVAC maintenance visit").';
      }
      return null;
    }

    function openRefundPanel() {
      if (!isRefundablePaymentIntent(latestIntentResponse)) {
        showStatus("error", "Only succeeded, refundable PaymentIntents can be refunded here.");
        return;
      }

      const refundableAmount = Number(latestIntentResponse.summary.refundableAmount || 0);
      refundAmountEl.value = "0.00";
      refundNoteEl.value = "";
      refundConfirmEl.checked = false;
      refundSubmitBtn.disabled = true;
      document.getElementById("refundMaxNote").textContent =
        `Refundable: ${formatMoney(refundableAmount)}. Enter the exact amount — double-check it.`;
      refundPanel.hidden = false;
      clearStatus();
      refundAmountEl.focus();
    }

    refundConfirmEl.addEventListener("change", () => {
      refundSubmitBtn.disabled = !refundConfirmEl.checked;
    });

    refundCancelBtn.addEventListener("click", () => {
      refundPanel.hidden = true;
    });

    async function submitRefund() {
      const refundableAmount = Number(latestIntentResponse?.summary?.refundableAmount || 0);
      const refundAmount = Number(refundAmountEl.value);

      if (!Number.isFinite(refundAmount) || refundAmount <= 0) {
        showStatus("error", "Enter the exact refund amount — it can't be zero.");
        return;
      }

      if (refundAmount > refundableAmount) {
        showStatus("error", `Refund amount cannot exceed ${formatMoney(refundableAmount)}.`);
        return;
      }

      const noteError = refundNoteError(refundNoteEl.value);
      if (noteError) {
        showStatus("error", noteError);
        refundNoteEl.focus();
        return;
      }

      if (!refundConfirmEl.checked) {
        showStatus("error", "Check the confirmation box before submitting.");
        return;
      }

      refundSubmitBtn.disabled = true;
      refundSubmitBtn.textContent = "Refunding...";
      clearStatus();

      try {
        const res = await fetch(`/api/intent-lookup/payment_intent/${encodeURIComponent(latestIntentResponse.id)}/refund`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            amount: refundAmount,
            note: refundNoteEl.value.trim(),
            confirmed: true,
            reason: "requested_by_customer"
          })
        });

        const data = await res.json();
        if (!res.ok) {
          throw new Error(data.error || "Unable to issue refund.");
        }

        refundPanel.hidden = true;
        showStatus("success", `Refund issued for ${formatMoney(data.amount || refundAmount)}.`);
        await runLookup();
      } catch (err) {
        showStatus("error", err.message || "Unable to issue refund.");
      } finally {
        refundSubmitBtn.disabled = !refundConfirmEl.checked;
        refundSubmitBtn.textContent = "Submit refund";
      }
    }

    refundSubmitBtn.addEventListener("click", submitRefund);

    const finderQueryEl = document.getElementById("finderQuery");
    const finderBtn = document.getElementById("finderBtn");
    const finderResultsEl = document.getElementById("finderResults");

    function escapeText(value) {
      return String(value == null ? "" : value);
    }

    async function runFinder() {
      const query = finderQueryEl.value.trim();
      if (query.length < 3) {
        showStatus("error", "Enter at least 3 characters of a phone, email, or name.");
        return;
      }

      finderBtn.disabled = true;
      finderBtn.textContent = "Searching...";
      clearStatus();

      try {
        const res = await fetch(`/api/intent-lookup/find?q=${encodeURIComponent(query)}`, {
          credentials: "same-origin"
        });
        const data = await res.json();
        if (!res.ok) {
          throw new Error(data.error || "Unable to search payments.");
        }

        finderResultsEl.textContent = "";
        finderResultsEl.hidden = false;

        if (!data.matches.length) {
          const empty = document.createElement("div");
          empty.className = "hit-meta";
          empty.textContent = `No payments matched that ${data.searchedBy}. Try fewer digits or a different key.`;
          finderResultsEl.appendChild(empty);
          return;
        }

        for (const match of data.matches) {
          const hit = document.createElement("div");
          hit.className = "finder-hit";

          const main = document.createElement("div");
          main.className = "hit-main";
          const title = document.createElement("strong");
          title.textContent = escapeText(match.customerName || "Unknown customer");
          const meta = document.createElement("div");
          meta.className = "hit-meta";
          const when = match.when ? new Date(match.when).toLocaleDateString() : "—";
          meta.textContent = [
            match.amount ? formatMoney(match.amount) : null,
            when,
            match.salesOrder || match.description || null,
            match.source,
            match.customerPhone || match.customerEmail || null
          ].filter(Boolean).join(" · ");
          main.appendChild(title);
          main.appendChild(meta);

          const useBtn = document.createElement("button");
          useBtn.type = "button";
          useBtn.className = "btn btn-secondary";
          useBtn.textContent = "Use";
          useBtn.addEventListener("click", () => {
            intentKindEl.value = "payment_intent";
            intentIdEl.value = match.paymentIntentId;
            finderResultsEl.hidden = true;
            runLookup();
          });

          hit.appendChild(main);
          hit.appendChild(useBtn);
          finderResultsEl.appendChild(hit);
        }
      } catch (err) {
        showStatus("error", err.message || "Unable to search payments.");
      } finally {
        finderBtn.disabled = false;
        finderBtn.textContent = "Find payments";
      }
    }

    finderBtn.addEventListener("click", runFinder);
    finderQueryEl.addEventListener("keydown", (event) => {
      if (event.key === "Enter") runFinder();
    });

    async function runLookup() {
      clearStatus();
      refundPanel.hidden = true;
      const kind = intentKindEl.value;
      const id = intentIdEl.value.trim();

      if (!id) {
        showStatus("error", "Enter a PaymentIntent ID or SetupIntent ID first.");
        return;
      }

      lookupBtn.disabled = true;
      lookupBtn.textContent = "Looking up...";

      try {
        const res = await fetch(`/api/intent-lookup/${encodeURIComponent(kind)}/${encodeURIComponent(id)}`);
        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.error || "Unable to look up intent.");
        }

        renderLookup(data);
        showStatus("success", "Intent loaded successfully.");
      } catch (err) {
        latestIntentResponse = null;
        refundBtn.hidden = true;
        helperTextEl.textContent = "Enter a PaymentIntent or SetupIntent ID to see the customer, employee, date, amount, and status history in a more readable format.";
        renderSummaryRows(summaryPrimaryEl, [
          { label: "Status", value: "No intent loaded yet." }
        ]);
        renderSummaryRows(summaryDatesEl, [
          { label: "Sent", value: "-" }
        ]);
        customerMessagePanel.classList.remove("show");
        customerMessageText.textContent = "";
        eventsTableBody.innerHTML = `<tr><td colspan="4" class="empty">Lookup failed.</td></tr>`;
        showStatus("error", err.message || "Lookup failed.");
      } finally {
        lookupBtn.disabled = false;
        lookupBtn.textContent = "Look up";
      }
    }

    lookupBtn.addEventListener("click", runLookup);
    intentIdEl.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        event.preventDefault();
        runLookup();
      }
    });

    exportCsvBtn.addEventListener("click", () => {
      downloadCsv();
    });

    copyCustomerMessageBtn.addEventListener("click", async () => {
      const message = String(latestIntentResponse?.customerMessage || "").trim();
      if (!message) {
        showStatus("error", "No customer message is available for this lookup.");
        return;
      }

      try {
        await navigator.clipboard.writeText(message);
        showStatus("success", "Customer message copied to clipboard.");
      } catch {
        showStatus("error", "Could not copy the customer message.");
      }
    });

    refundBtn.addEventListener("click", openRefundPanel);
  </script>
</body>
</html>
