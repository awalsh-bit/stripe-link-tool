<!DOCTYPE html>
<html lang="en">
<meta name="robots" content="noindex,nofollow,noarchive">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wilson AC & Appliance - Intent Lookup</title>
  <link rel="stylesheet" href="internal-shell.css" />
  <style>
    :root {
      --bg: #f7f8fc;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #dbe1ea;
      --primary: #635bff;
      --primary-hover: #564ef0;
      --shadow: 0 10px 35px rgba(0, 0, 0, 0.08);
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #eef2ff 0%, var(--bg) 100%);
      color: var(--text);
      min-height: 100vh;
      padding: 32px 16px;
    }

    .wrap {
      max-width: 1480px;
      margin: 0 auto;
    }

    .card {
      background: var(--card);
      border: 1px solid rgba(99, 91, 255, 0.12);
      box-shadow: var(--shadow);
      border-radius: var(--radius);
      padding: 22px;
    }

    .lookup-grid {
      display: grid;
      grid-template-columns: 180px minmax(0, 1fr) auto auto;
      gap: 12px;
      align-items: end;
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      font-weight: 700;
      margin-bottom: 8px;
    }

    select,
    input,
    button {
      font: inherit;
    }

    select,
    input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      background: #fff;
      color: var(--text);
      outline: none;
    }

    select:focus,
    input:focus {
      border-color: rgba(99, 91, 255, 0.75);
      box-shadow: 0 0 0 4px rgba(99, 91, 255, 0.12);
    }

    .btn {
      appearance: none;
      border: 1px solid transparent;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.12s ease, border-color 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn-primary {
      background: var(--primary);
      color: #fff;
    }

    .btn-primary:hover {
      background: var(--primary-hover);
    }

    .btn-secondary {
      background: #fff;
      color: var(--text);
      border-color: var(--border);
    }

    .status {
      min-height: 24px;
      margin-bottom: 14px;
      font-size: 14px;
      color: var(--muted);
    }

    .status.error {
      color: #b91c1c;
    }

    .status.success {
      color: #166534;
    }

    .result-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .result-title {
      font-size: 15px;
      font-weight: 800;
    }

    .result-meta {
      color: var(--muted);
      font-size: 13px;
    }

    .result-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    pre {
      margin: 0;
      padding: 18px;
      border-radius: 16px;
      border: 1px solid #e7ebf4;
      background: #0f172a;
      color: #e2e8f0;
      font-size: 13px;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
      overflow: auto;
      max-height: 70vh;
    }

    @media (max-width: 1200px) {
      .tools-strip {
        min-width: 0;
        width: 100%;
      }

      .tools-strip-row {
        flex-wrap: wrap;
      }
    }

    @media (max-width: 900px) {
      .lookup-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body data-shell-label="Intent Lookup" data-shell-icon="lookup">
  <div class="wrap">
    <div id="internal-shell-header"></div>
    <div class="card">
      <div class="lookup-grid">
        <div>
          <label for="intentKind">Intent Type</label>
          <select id="intentKind">
            <option value="auto">Auto-detect</option>
            <option value="payment_intent">PaymentIntent</option>
            <option value="setup_intent">SetupIntent</option>
          </select>
        </div>

        <div>
          <label for="intentId">Intent ID</label>
          <input id="intentId" placeholder="pi_... or seti_..." />
        </div>

        <button id="lookupBtn" class="btn btn-primary" type="button">Look up</button>
        <button id="copyBtn" class="btn btn-secondary" type="button">Copy JSON</button>
      </div>

      <div id="status" class="status"></div>

      <div class="result-toolbar">
        <div>
          <div class="result-title">Stripe response</div>
          <div id="resultMeta" class="result-meta">No intent loaded yet.</div>
        </div>
        <div class="result-actions">
          <button id="exportCsvBtn" class="btn btn-secondary" type="button">Export visible to CSV</button>
        </div>
      </div>

      <pre id="resultBox">Awaiting lookup...</pre>
    </div>
    <div id="internal-shell-footer"></div>
  </div>

  <script>
    const intentKindEl = document.getElementById("intentKind");
    const intentIdEl = document.getElementById("intentId");
    const lookupBtn = document.getElementById("lookupBtn");
    const copyBtn = document.getElementById("copyBtn");
    const exportCsvBtn = document.getElementById("exportCsvBtn");
    const statusEl = document.getElementById("status");
    const resultMetaEl = document.getElementById("resultMeta");
    const resultBox = document.getElementById("resultBox");

    let latestJson = "";
    let latestIntentData = null;

    function showStatus(type, message) {
      statusEl.className = `status ${type}`;
      statusEl.textContent = message;
    }

    function clearStatus() {
      statusEl.className = "status";
      statusEl.textContent = "";
    }

    function escapeCsv(value) {
      const stringValue = String(value ?? "");
      if (/[",\n]/.test(stringValue)) {
        return `"${stringValue.replace(/"/g, '""')}"`;
      }
      return stringValue;
    }

    function flattenForCsv(value, prefix = "") {
      if (Array.isArray(value)) {
        return value.flatMap((item, index) => flattenForCsv(item, prefix ? `${prefix}[${index}]` : `[${index}]`));
      }

      if (value && typeof value === "object") {
        return Object.entries(value).flatMap(([key, nestedValue]) =>
          flattenForCsv(nestedValue, prefix ? `${prefix}.${key}` : key)
        );
      }

      return [[prefix, value ?? ""]];
    }

    function downloadCsv() {
      if (!latestIntentData) {
        showStatus("error", "There is no loaded intent to export yet.");
        return;
      }

      const rows = flattenForCsv(latestIntentData);
      const lines = [
        "Field,Value",
        ...rows.map(([field, value]) => [field, value].map(escapeCsv).join(","))
      ];

      const blob = new Blob([lines.join("\r\n")], { type: "text/csv;charset=utf-8;" });
      const link = document.createElement("a");
      const id = String(latestIntentData.id || "intent").replace(/[^a-z0-9_-]+/gi, "_");
      link.href = URL.createObjectURL(blob);
      link.download = `intent-lookup_${id}.csv`;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(link.href);
    }

    async function runLookup() {
      clearStatus();
      const kind = intentKindEl.value;
      const id = intentIdEl.value.trim();

      if (!id) {
        showStatus("error", "Enter a PaymentIntent ID or SetupIntent ID first.");
        return;
      }

      lookupBtn.disabled = true;
      lookupBtn.textContent = "Looking up...";

      try {
        const res = await fetch(`/api/intent-lookup/${encodeURIComponent(kind)}/${encodeURIComponent(id)}`);
        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.error || "Unable to look up intent.");
        }

        latestIntentData = data.intent;
        latestJson = JSON.stringify(data.intent, null, 2);
        resultBox.textContent = latestJson;
        resultMetaEl.textContent = `${data.kind === "payment_intent" ? "PaymentIntent" : "SetupIntent"} • ${data.id}`;
        showStatus("success", "Intent loaded successfully.");
      } catch (err) {
        latestIntentData = null;
        latestJson = "";
        resultBox.textContent = "Lookup failed.";
        resultMetaEl.textContent = "No intent loaded yet.";
        showStatus("error", err.message || "Lookup failed.");
      } finally {
        lookupBtn.disabled = false;
        lookupBtn.textContent = "Look up";
      }
    }

    lookupBtn.addEventListener("click", runLookup);
    intentIdEl.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        event.preventDefault();
        runLookup();
      }
    });

    copyBtn.addEventListener("click", async () => {
      if (!latestJson) {
        showStatus("error", "There is no loaded JSON to copy yet.");
        return;
      }

      try {
        await navigator.clipboard.writeText(latestJson);
        showStatus("success", "Intent JSON copied to clipboard.");
      } catch {
        showStatus("error", "Unable to copy JSON.");
      }
    });

    exportCsvBtn.addEventListener("click", () => {
      downloadCsv();
    });
  </script>
  <script src="internal-shell.js"></script>
</body>
</html>
