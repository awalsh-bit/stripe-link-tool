<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex,nofollow,noarchive" />
  <title>Wilson AC & Appliance - Login</title>
  <style>
    :root {
      --bg: #f7f8fc;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #dbe1ea;
      --primary: #635bff;
      --primary-hover: #564ef0;
      --error-bg: #fef2f2;
      --error-text: #991b1b;
      --shadow: 0 10px 35px rgba(0, 0, 0, 0.08);
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #eef2ff 0%, var(--bg) 100%);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .card {
      width: min(100%, 460px);
      background: var(--card);
      border: 1px solid rgba(99, 91, 255, 0.12);
      box-shadow: var(--shadow);
      border-radius: var(--radius);
      padding: 28px;
    }

    .logo {
      width: min(100%, 260px);
      height: auto;
      display: block;
      margin: 0 auto 20px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 38px;
      padding: 0 14px;
      border-radius: 999px;
      background: rgba(99, 91, 255, 0.1);
      color: var(--primary);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(30px, 5vw, 42px);
      line-height: 1.06;
    }

    p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }

    .field + .field {
      margin-top: 14px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 700;
    }

    input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 13px 14px;
      font-size: 15px;
      background: #fff;
      color: var(--text);
      outline: none;
    }

    input:focus {
      border-color: rgba(99, 91, 255, 0.75);
      box-shadow: 0 0 0 4px rgba(99, 91, 255, 0.12);
    }

    .help {
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
    }

    button {
      appearance: none;
      border: none;
      background: var(--primary);
      color: white;
      width: 100%;
      margin-top: 18px;
      padding: 14px 18px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
    }

    button:hover {
      background: var(--primary-hover);
    }

    button:disabled {
      opacity: 0.65;
      cursor: wait;
    }

    .status {
      display: none;
      margin-top: 16px;
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 14px;
      line-height: 1.5;
    }

    .status.show {
      display: block;
    }

    .status.error {
      background: var(--error-bg);
      color: var(--error-text);
    }
  </style>
</head>
<body>
  <div class="card">
    <img class="logo" src="logo-black.png" alt="Wilson AC & Appliance" />
    <div class="badge">Internal Tools Login</div>
    <h1>Sign in</h1>
    <p>Use the Wilson username and password to access internal tools.</p>

    <form id="loginForm">
      <div class="field">
        <label for="username">Username</label>
        <input id="username" name="username" value="wilson" autocomplete="username" />
        <div class="help">We can switch this to email-based access later.</div>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" />
      </div>

      <button id="loginBtn" type="submit">Continue</button>
      <div id="status" class="status error"></div>
    </form>
  </div>

  <script>
    const form = document.getElementById("loginForm");
    const loginBtn = document.getElementById("loginBtn");
    const statusBox = document.getElementById("status");

    function showError(message) {
      statusBox.className = "status error show";
      statusBox.textContent = message;
    }

    function clearError() {
      statusBox.className = "status error";
      statusBox.textContent = "";
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      clearError();
      loginBtn.disabled = true;
      loginBtn.textContent = "Signing in...";

      try {
        const res = await fetch("/api/login", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            username: document.getElementById("username").value.trim(),
            password: document.getElementById("password").value
          })
        });

        const data = await res.json();
        if (!res.ok) {
          throw new Error(data.error || "Unable to sign in.");
        }

        window.location.href = "/dashboard.html";
      } catch (err) {
        showError(err.message || "Unable to sign in.");
      } finally {
        loginBtn.disabled = false;
        loginBtn.textContent = "Continue";
      }
    });
  </script>
</body>
</html>
