<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex,nofollow,noarchive" />
  <title>Wilson AC & Appliance - Login</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <style>
    :root {
      --bg: #f7f8fc;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #dbe1ea;
      --primary: #635bff;
      --primary-hover: #564ef0;
      --error-bg: #fef2f2;
      --error-text: #991b1b;
      --ok-bg: #ecfdf5;
      --ok-text: #065f46;
      --shadow: 0 10px 35px rgba(0, 0, 0, 0.08);
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #eef2ff 0%, var(--bg) 100%);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .card {
      width: min(100%, 460px);
      background: var(--card);
      border: 1px solid rgba(99, 91, 255, 0.12);
      box-shadow: var(--shadow);
      border-radius: var(--radius);
      padding: 28px;
    }

    .header-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      flex-wrap: nowrap;
      margin-bottom: 22px;
    }

    .logo {
      width: 220px;
      max-width: 100%;
      height: auto;
      display: block;
      flex: 0 0 auto;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 38px;
      padding: 0 14px;
      border-radius: 999px;
      background: rgba(99, 91, 255, 0.1);
      color: var(--primary);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    @media (max-width: 520px) {
      .header-row { flex-wrap: wrap; }
    }

    .field + .field { margin-top: 14px; }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 700;
    }

    input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 13px 14px;
      font-size: 15px;
      background: #fff;
      color: var(--text);
      outline: none;
    }

    input:focus {
      border-color: rgba(99, 91, 255, 0.75);
      box-shadow: 0 0 0 4px rgba(99, 91, 255, 0.12);
    }

    button {
      appearance: none;
      border: none;
      background: var(--primary);
      color: white;
      width: 100%;
      margin-top: 18px;
      padding: 14px 18px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
    }

    button:hover { background: var(--primary-hover); }

    button:disabled {
      opacity: 0.65;
      cursor: wait;
    }

    .status {
      display: none;
      margin-top: 16px;
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 14px;
      line-height: 1.5;
    }

    .status.show { display: block; }

    .status.error {
      background: var(--error-bg);
      color: var(--error-text);
    }

    .status.ok {
      background: var(--ok-bg);
      color: var(--ok-text);
    }

    .links-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-top: 16px;
      font-size: 14px;
    }

    .links-row a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 700;
      cursor: pointer;
    }

    .links-row a:hover { text-decoration: underline; }

    .subtext {
      margin-top: 14px;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
      text-align: center;
    }

    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="header-row">
      <img class="logo" src="./logo-black.png" alt="Wilson AC & Appliance" />
      <div class="badge">Internal Tools Login</div>
    </div>

    <form id="loginForm">
      <div class="field">
        <label for="email">Email</label>
        <input id="email" name="email" type="text" autocomplete="username" placeholder="you@wilsonappliance.com" />
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" />
      </div>

      <button id="loginBtn" type="submit">Continue</button>
    </form>

    <form id="resetForm" class="hidden">
      <div class="field">
        <label for="resetEmail">Email</label>
        <input id="resetEmail" name="resetEmail" type="text" autocomplete="username" placeholder="you@wilsonappliance.com" />
      </div>
      <button id="resetBtn" type="submit">Email me a reset link</button>
      <div class="subtext">We'll email a single-use link that expires in 1 hour.</div>
    </form>

    <div id="status" class="status"></div>

    <div class="links-row">
      <a id="toggleReset">Forgot password?</a>
      <a href="/register.html">Register</a>
    </div>

    <div class="subtext">
      New accounts require a company email address and are activated by an executive after email verification.
    </div>
  </div>

  <script>
    const loginForm = document.getElementById("loginForm");
    const resetForm = document.getElementById("resetForm");
    const loginBtn = document.getElementById("loginBtn");
    const resetBtn = document.getElementById("resetBtn");
    const statusBox = document.getElementById("status");
    const toggleReset = document.getElementById("toggleReset");

    let resetMode = false;

    function showStatus(message, kind) {
      statusBox.className = "status " + kind + " show";
      statusBox.textContent = message;
    }

    function clearStatus() {
      statusBox.className = "status";
      statusBox.textContent = "";
    }

    toggleReset.addEventListener("click", () => {
      resetMode = !resetMode;
      clearStatus();
      loginForm.classList.toggle("hidden", resetMode);
      resetForm.classList.toggle("hidden", !resetMode);
      toggleReset.textContent = resetMode ? "Back to sign in" : "Forgot password?";

      if (resetMode) {
        document.getElementById("resetEmail").value = document.getElementById("email").value;
      }
    });

    function pickLandingPage(user) {
      if (user && user.isExecutive) return "/dashboard.html";
      if (user && Array.isArray(user.grantedPages)) {
        if (user.grantedPages.includes("/dashboard.html")) return "/dashboard.html";
        if (user.grantedPages.length) return user.grantedPages[0];
        return null;
      }
      return "/dashboard.html";
    }

    loginForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      clearStatus();
      loginBtn.disabled = true;
      loginBtn.textContent = "Signing in...";

      try {
        const res = await fetch("/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            email: document.getElementById("email").value.trim(),
            password: document.getElementById("password").value
          })
        });

        const data = await res.json();
        if (!res.ok) {
          throw new Error(data.error || "Unable to sign in.");
        }

        const landing = pickLandingPage(data.user);
        if (!landing) {
          showStatus("You're signed in, but no tools have been assigned to your account yet. Ask an executive to grant you access.", "ok");
          return;
        }

        window.location.href = landing;
      } catch (err) {
        showStatus(err.message || "Unable to sign in.", "error");
      } finally {
        loginBtn.disabled = false;
        loginBtn.textContent = "Continue";
      }
    });

    resetForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      clearStatus();
      resetBtn.disabled = true;
      resetBtn.textContent = "Sending...";

      try {
        const res = await fetch("/api/auth/request-reset", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            email: document.getElementById("resetEmail").value.trim()
          })
        });

        const data = await res.json();
        if (!res.ok) {
          throw new Error(data.error || "Unable to send the reset email.");
        }

        showStatus(data.message || "If that address has an account, we've sent a password reset email.", "ok");
      } catch (err) {
        showStatus(err.message || "Unable to send the reset email.", "error");
      } finally {
        resetBtn.disabled = false;
        resetBtn.textContent = "Email me a reset link";
      }
    });

    // Handle email-verification links: login.html?verifyToken=...
    (async function handleVerifyToken() {
      const params = new URLSearchParams(window.location.search);
      const token = params.get("verifyToken");
      if (!token) return;

      window.history.replaceState({}, "", "/login.html");
      showStatus("Verifying your email...", "ok");

      try {
        const res = await fetch("/api/auth/verify-email", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token })
        });

        const data = await res.json();
        if (!res.ok) {
          throw new Error(data.error || "Unable to verify your email.");
        }

        showStatus(data.message || "Email verified. You can now sign in.", "ok");
      } catch (err) {
        showStatus(err.message || "Unable to verify your email.", "error");
      }
    })();
  </script>
</body>
</html>
