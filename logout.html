<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex,nofollow,noarchive" />
  <title>Wilson AC & Appliance - Sign Out</title>
  <style>
    :root {
      --bg: #f7f8fc;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #dbe1ea;
      --primary: #635bff;
      --shadow: 0 10px 35px rgba(0, 0, 0, 0.08);
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #eef2ff 0%, var(--bg) 100%);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .card {
      width: min(100%, 460px);
      background: var(--card);
      border: 1px solid rgba(99, 91, 255, 0.12);
      box-shadow: var(--shadow);
      border-radius: var(--radius);
      padding: 28px;
      text-align: center;
    }

    .logo {
      width: min(100%, 240px);
      height: auto;
      display: block;
      margin: 0 auto 18px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 38px;
      padding: 0 14px;
      border-radius: 999px;
      background: rgba(99, 91, 255, 0.1);
      color: var(--primary);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(28px, 4vw, 38px);
      line-height: 1.08;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
      font-size: 15px;
    }
  </style>
</head>
<body>
  <div class="card">
    <img class="logo" src="logo-black.png" alt="Wilson AC & Appliance" />
    <div class="badge">Signing out</div>
    <h1>One moment</h1>
    <p id="message">Ending your dashboard session...</p>
  </div>

  <script>
    (async () => {
      const messageEl = document.getElementById("message");

      try {
        await fetch("/api/logout", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          }
        });
      } catch {
        // Ignore sign-out request errors and continue to login.
      }

      messageEl.textContent = "You have been signed out.";
      setTimeout(() => {
        window.location.href = "/login.html";
      }, 350);
    })();
  </script>
</body>
</html>
