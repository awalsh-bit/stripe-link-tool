<!DOCTYPE html>
<html lang="en">
<meta name="robots" content="noindex,nofollow,noarchive">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wilson AC &amp; Appliance - Secret Menu</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="stylesheet" href="internal-shell.css" />
  <style>
    :root {
      --bg: #f7f8fc;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #dbe1ea;
      --primary: #635bff;
      --primary-hover: #564ef0;
      --accent-dark: #2d2566;
      --accent-gold: #c9a14a;
      --success-bg: #ecfdf5;
      --success-text: #065f46;
      --shadow: 0 10px 35px rgba(0, 0, 0, 0.08);
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #eef2ff 0%, var(--bg) 100%);
      color: var(--text);
      min-height: 100vh;
      padding: 32px 16px;
    }

    .wrap {
      max-width: 1480px;
      margin: 0 auto;
    }

    .page-intro {
      background: linear-gradient(135deg, #2d2566 0%, #4338ca 60%, #635bff 100%);
      color: #fff;
      border-radius: var(--radius);
      padding: 22px 26px;
      margin-bottom: 22px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      flex-wrap: wrap;
      box-shadow: var(--shadow);
    }

    .page-intro-title {
      font-size: 22px;
      font-weight: 800;
      margin: 0 0 4px;
      letter-spacing: 0.02em;
    }

    .page-intro-sub {
      margin: 0;
      font-size: 14px;
      color: rgba(255, 255, 255, 0.85);
      line-height: 1.5;
    }

    .page-intro-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.15);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .page-intro-count {
      color: rgba(255, 255, 255, 0.78);
      font-size: 13px;
      font-weight: 600;
    }

    .filter-row {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .search-input {
      flex: 1 1 280px;
      max-width: 420px;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 15px;
      background: #fff;
      color: var(--text);
      outline: none;
    }

    .search-input:focus {
      border-color: rgba(99, 91, 255, 0.65);
      box-shadow: 0 0 0 4px rgba(99, 91, 255, 0.12);
    }

    .brand-filter {
      display: inline-flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .brand-chip {
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
    }

    .brand-chip:hover {
      background: #f5f7ff;
      border-color: rgba(99, 91, 255, 0.32);
    }

    .brand-chip.active {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
      gap: 18px;
    }

    .card {
      background: var(--card);
      border: 1px solid rgba(99, 91, 255, 0.12);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .card-body {
      display: grid;
      grid-template-columns: 150px 1fr;
      gap: 16px;
      padding: 16px 18px;
    }

    .card-image-wrap {
      width: 150px;
      height: 150px;
      border-radius: 14px;
      background: #f5f7ff;
      border: 1px solid rgba(99, 91, 255, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      flex: 0 0 150px;
    }

    .card-image-wrap img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    .card-image-placeholder {
      color: #94a3b8;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-align: center;
      padding: 8px;
    }

    .card-text {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .card-brand {
      font-size: 11px;
      font-weight: 800;
      color: var(--primary);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .card-model {
      font-size: 18px;
      font-weight: 800;
      color: var(--text);
      margin: 0;
      line-height: 1.2;
      word-break: break-word;
    }

    .card-description {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
      margin: 4px 0 0;
    }

    .card-description.todo {
      color: #b45309;
      font-style: italic;
    }

    .card-detail {
      padding: 0 18px 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .detail-line {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      font-size: 13px;
      line-height: 1.45;
    }

    .detail-line-label {
      flex: 0 0 96px;
      color: var(--muted);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-size: 11px;
      padding-top: 2px;
    }

    .detail-line-value {
      flex: 1 1 auto;
      color: var(--text);
    }

    .detail-line-value.muted {
      color: var(--muted);
    }

    .total-block {
      background: linear-gradient(135deg, #2d2566 0%, #4338ca 100%);
      color: #fff;
      border-radius: 14px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-top: 4px;
    }

    .total-label {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      opacity: 0.85;
    }

    .total-value {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 0.01em;
    }

    .total-breakdown {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.78);
      margin-top: 2px;
    }

    .expiration-strip {
      background: #fffbeb;
      color: #92400e;
      border-top: 1px solid rgba(217, 119, 6, 0.18);
      padding: 10px 18px;
      font-size: 12px;
      font-weight: 700;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .expiration-strip.expiration-state-urgent {
      background: #fff1f2;
      color: #991b1b;
      border-top-color: rgba(220, 38, 38, 0.24);
    }

    .expiration-strip.expiration-state-expired {
      background: #f3f4f6;
      color: #6b7280;
      border-top-color: rgba(75, 85, 99, 0.18);
      text-decoration: line-through;
    }

    .expiration-strip svg {
      flex: 0 0 14px;
    }

    .empty-state {
      grid-column: 1 / -1;
      background: #fff;
      border: 1px dashed rgba(99, 91, 255, 0.25);
      border-radius: var(--radius);
      padding: 40px 20px;
      text-align: center;
      color: var(--muted);
    }

    .loading {
      grid-column: 1 / -1;
      padding: 40px 20px;
      text-align: center;
      color: var(--muted);
    }

    .error-banner {
      background: #fef2f2;
      color: #991b1b;
      border-radius: 14px;
      padding: 14px 16px;
      margin-bottom: 18px;
      font-size: 14px;
      font-weight: 600;
    }

    @media (max-width: 560px) {
      .card-body {
        grid-template-columns: 110px 1fr;
        gap: 12px;
        padding: 12px 14px;
      }
      .card-image-wrap {
        width: 110px;
        height: 110px;
        flex-basis: 110px;
      }
      .card-detail {
        padding: 0 14px 14px;
      }
      .detail-line {
        flex-direction: column;
        gap: 2px;
      }
      .detail-line-label {
        flex-basis: auto;
      }
      .total-value {
        font-size: 19px;
      }
    }
  </style>
</head>
<body data-shell-label="Secret Menu" data-shell-icon="sales">
  <div class="wrap">
    <div id="internal-shell-header"></div>

    <div class="page-intro">
      <div>
        <span class="page-intro-eyebrow">Sales Tools</span>
        <h1 class="page-intro-title">Secret Menu</h1>
        <p class="page-intro-sub">Confidential pricing and promotions for Wilson sales team. Totals already include accessories and 8.25% tax.</p>
      </div>
      <div class="page-intro-count" id="itemCount">&nbsp;</div>
    </div>

    <div id="errorBanner" class="error-banner" style="display: none;"></div>

    <div class="filter-row">
      <input id="searchInput" class="search-input" type="search" placeholder="Search model, brand, description..." aria-label="Search the secret menu" />
      <div class="brand-filter" id="brandFilter"></div>
    </div>

    <div class="grid" id="cardGrid">
      <div class="loading">Loading the menu...</div>
    </div>

    <div id="internal-shell-footer"></div>
  </div>

  <script src="internal-shell.js"></script>
  <script>
    (function () {
      const cardGrid = document.getElementById("cardGrid");
      const errorBanner = document.getElementById("errorBanner");
      const itemCount = document.getElementById("itemCount");
      const searchInput = document.getElementById("searchInput");
      const brandFilter = document.getElementById("brandFilter");

      let items = [];
      let activeBrand = "All";
      let searchTerm = "";
      let taxRate = 0.0825;

      function parseExpiration(raw) {
        const text = String(raw == null ? "" : raw).trim();
        if (!text) {
          return { label: "No expiration listed", state: "neutral" };
        }

        // =TODAY()+N optionally "until YYYY-MM-DD"
        const rollingMatch = text.match(/^=\s*today\s*\(\s*\)\s*([+\-])\s*(\d+)\s*(?:until\s+(\d{4}-\d{2}-\d{2}))?\s*$/i);
        if (rollingMatch) {
          const sign = rollingMatch[1] === "-" ? -1 : 1;
          const days = sign * parseInt(rollingMatch[2], 10);
          const capStr = rollingMatch[3] || null;
          return computeExpirationLabel(days, capStr);
        }

        // =YYYY-MM-DD (plain fixed date)
        const fixedMatch = text.match(/^=\s*(\d{4}-\d{2}-\d{2})\s*$/);
        if (fixedMatch) {
          return computeExpirationLabel(null, fixedMatch[1]);
        }

        // Literal text passthrough
        return { label: text, state: "neutral" };
      }

      function computeExpirationLabel(daysFromToday, capYmd) {
        const today = startOfToday();
        const rolling = daysFromToday == null
          ? null
          : addDays(today, daysFromToday);
        const cap = capYmd ? parseYmd(capYmd) : null;

        let effective;
        if (rolling && cap) {
          effective = rolling.getTime() < cap.getTime() ? rolling : cap;
        } else {
          effective = rolling || cap;
        }
        if (!effective) {
          return { label: "No expiration listed", state: "neutral" };
        }

        const msPerDay = 86400000;
        const daysRemaining = Math.round((effective.getTime() - today.getTime()) / msPerDay);
        const formatted = effective.toLocaleDateString("en-US", { month: "numeric", day: "numeric", year: "numeric" });

        if (daysRemaining < 0) {
          return { label: "Expired " + formatted, state: "expired" };
        }
        if (daysRemaining === 0) {
          return { label: "Valid through today (" + formatted + ")", state: "urgent" };
        }
        if (daysRemaining <= 3) {
          return { label: "Valid through " + formatted + " (" + daysRemaining + " day" + (daysRemaining === 1 ? "" : "s") + " left)", state: "urgent" };
        }
        return { label: "Valid through " + formatted, state: "neutral" };
      }

      function startOfToday() {
        const d = new Date();
        d.setHours(0, 0, 0, 0);
        return d;
      }

      function addDays(date, days) {
        const d = new Date(date.getTime());
        d.setDate(d.getDate() + days);
        return d;
      }

      function parseYmd(ymd) {
        const parts = String(ymd).split("-").map(Number);
        if (parts.length !== 3 || parts.some((n) => !Number.isFinite(n))) return null;
        const d = new Date(parts[0], parts[1] - 1, parts[2]);
        d.setHours(0, 0, 0, 0);
        return d;
      }

      function escapeHtml(value) {
        return String(value == null ? "" : value).replace(/[&<>"']/g, (char) => ({
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          "\"": "&quot;",
          "'": "&#39;"
        })[char]);
      }

      function formatMoney(value) {
        return new Intl.NumberFormat("en-US", {
          style: "currency",
          currency: "USD"
        }).format(Number(value) || 0);
      }

      function calculateTotal(item) {
        const subtotal = Number(item.price || 0)
          + Number(item.promoAmount || 0)
          + Number(item.accessoryAmount || 0);
        return Math.round(subtotal * (1 + taxRate) * 100) / 100;
      }

      function showError(message) {
        errorBanner.textContent = message;
        errorBanner.style.display = "block";
      }

      function clearError() {
        errorBanner.style.display = "none";
        errorBanner.textContent = "";
      }

      function buildImageHtml(item) {
        if (!item.image) {
          return `<div class="card-image-placeholder">${escapeHtml(item.brand || "")}<br/>${escapeHtml(item.model)}</div>`;
        }
        const altText = `${item.brand || ""} ${item.model}`.trim();
        return `<img src="${escapeHtml(item.image)}" alt="${escapeHtml(altText)}" loading="lazy" onerror="this.parentNode.innerHTML='<div class=&quot;card-image-placeholder&quot;>${escapeHtml(item.brand || "")}<br/>${escapeHtml(item.model)}</div>';" />`;
      }

      function buildCard(item) {
        const total = calculateTotal(item);
        const isTodoDescription = String(item.description || "").startsWith("TODO_");
        const descriptionClass = isTodoDescription ? "card-description todo" : "card-description";
        const subtotal = Number(item.price || 0) + Number(item.promoAmount || 0) + Number(item.accessoryAmount || 0);
        const taxOnSub = Math.round((total - subtotal) * 100) / 100;
        const parsedExpiration = parseExpiration(item.expiration);
        const expirationLabel = parsedExpiration.label;
        const expirationState = parsedExpiration.state;

        return `
          <article class="card">
            <div class="card-body">
              <div class="card-image-wrap">${buildImageHtml(item)}</div>
              <div class="card-text">
                <span class="card-brand">${escapeHtml(item.brand || "")}</span>
                <h2 class="card-model">${escapeHtml(item.model)}</h2>
                <p class="${descriptionClass}">${escapeHtml(item.description || "")}</p>
              </div>
            </div>

            <div class="card-detail">
              <div class="detail-line">
                <div class="detail-line-label">Item price</div>
                <div class="detail-line-value">${formatMoney(item.price)}</div>
              </div>
              <div class="detail-line">
                <div class="detail-line-label">Promo</div>
                <div class="detail-line-value">${escapeHtml(item.promoText || "-")}</div>
              </div>
              <div class="detail-line">
                <div class="detail-line-label">Required</div>
                <div class="detail-line-value">${escapeHtml(item.accessoryText || "-")}</div>
              </div>

              <div class="total-block">
                <div>
                  <div class="total-label">Total w/ Tax</div>
                  <div class="total-breakdown">${formatMoney(subtotal)} subtotal + ${formatMoney(taxOnSub)} tax (8.25%)</div>
                </div>
                <div class="total-value">${formatMoney(total)}</div>
              </div>
            </div>

            <div class="expiration-strip expiration-state-${expirationState}">
              <svg viewBox="0 0 24 24" width="14" height="14" fill="none" aria-hidden="true">
                <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2"></circle>
                <path d="M12 7v5l3 2" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
              </svg>
              <span>${escapeHtml(expirationLabel)}</span>
            </div>
          </article>
        `;
      }

      function getBrands() {
        const set = new Set();
        for (const item of items) {
          const b = String(item.brand || "").trim();
          if (b) set.add(b);
        }
        return ["All", ...Array.from(set).sort()];
      }

      function renderBrandChips() {
        brandFilter.innerHTML = "";
        for (const brand of getBrands()) {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "brand-chip" + (brand === activeBrand ? " active" : "");
          btn.textContent = brand;
          btn.addEventListener("click", () => {
            activeBrand = brand;
            renderBrandChips();
            renderGrid();
          });
          brandFilter.appendChild(btn);
        }
      }

      function matchesFilters(item) {
        if (activeBrand !== "All" && String(item.brand || "") !== activeBrand) {
          return false;
        }
        if (!searchTerm) return true;
        const haystack = [
          item.model,
          item.brand,
          item.description,
          item.promoText,
          item.accessoryText,
          item.expiration
        ].join(" ").toLowerCase();
        return haystack.includes(searchTerm);
      }

      function renderGrid() {
        const filtered = items.filter(matchesFilters);
        if (filtered.length === 0) {
          cardGrid.innerHTML = `<div class="empty-state">No items match your filter.</div>`;
          itemCount.textContent = "0 of " + items.length;
          return;
        }
        cardGrid.innerHTML = filtered.map(buildCard).join("");
        const totalLabel = items.length === 1 ? "item" : "items";
        itemCount.textContent = filtered.length === items.length
          ? `${items.length} ${totalLabel}`
          : `${filtered.length} of ${items.length} ${totalLabel}`;
      }

      async function load() {
        try {
          const res = await fetch("/api/secret-menu", { credentials: "same-origin" });
          const data = await res.json();
          if (!res.ok) {
            throw new Error(data.error || "Unable to load the secret menu.");
          }
          taxRate = Number(data?._meta?.taxRate) || 0.0825;
          items = Array.isArray(data.items) ? data.items : [];
          renderBrandChips();
          renderGrid();
          clearError();
        } catch (err) {
          showError(err.message || "Unable to load the secret menu.");
          cardGrid.innerHTML = `<div class="empty-state">Could not load menu items.</div>`;
        }
      }

      searchInput.addEventListener("input", () => {
        searchTerm = searchInput.value.trim().toLowerCase();
        renderGrid();
      });

      load();
    })();
  </script>
</body>
</html>
