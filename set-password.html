<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex,nofollow,noarchive" />
  <title>Wilson AC & Appliance - Set Password</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <style>
    :root {
      --bg: #f7f8fc;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #dbe1ea;
      --primary: #635bff;
      --primary-hover: #564ef0;
      --error-bg: #fef2f2;
      --error-text: #991b1b;
      --ok-bg: #ecfdf5;
      --ok-text: #065f46;
      --shadow: 0 10px 35px rgba(0, 0, 0, 0.08);
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #eef2ff 0%, var(--bg) 100%);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .card {
      width: min(100%, 460px);
      background: var(--card);
      border: 1px solid rgba(99, 91, 255, 0.12);
      box-shadow: var(--shadow);
      border-radius: var(--radius);
      padding: 28px;
    }

    .header-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      flex-wrap: nowrap;
      margin-bottom: 22px;
    }

    .logo { width: 220px; max-width: 100%; height: auto; display: block; flex: 0 0 auto; }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 38px;
      padding: 0 14px;
      border-radius: 999px;
      background: rgba(99, 91, 255, 0.1);
      color: var(--primary);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    @media (max-width: 520px) { .header-row { flex-wrap: wrap; } }

    .field + .field { margin-top: 14px; }

    label { display: block; margin-bottom: 8px; font-size: 14px; font-weight: 700; }

    input {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 13px 14px;
      font-size: 15px;
      background: #fff;
      color: var(--text);
      outline: none;
    }

    input:focus {
      border-color: rgba(99, 91, 255, 0.75);
      box-shadow: 0 0 0 4px rgba(99, 91, 255, 0.12);
    }

    input:disabled { background: #f3f4f6; color: var(--muted); }

    button {
      appearance: none;
      border: none;
      background: var(--primary);
      color: white;
      width: 100%;
      margin-top: 18px;
      padding: 14px 18px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
    }

    button:hover { background: var(--primary-hover); }
    button:disabled { opacity: 0.65; cursor: wait; }

    .status {
      display: none;
      margin-top: 16px;
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 14px;
      line-height: 1.5;
    }

    .status.show { display: block; }
    .status.error { background: var(--error-bg); color: var(--error-text); }
    .status.ok { background: var(--ok-bg); color: var(--ok-text); }

    .subtext { margin-top: 14px; font-size: 13px; color: var(--muted); line-height: 1.5; }

    .links-row { margin-top: 16px; font-size: 14px; text-align: center; }
    .links-row a { color: var(--primary); text-decoration: none; font-weight: 700; }
    .links-row a:hover { text-decoration: underline; }

    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="header-row">
      <img class="logo" src="./logo-black.png" alt="Wilson AC & Appliance" />
      <div class="badge" id="titleBadge">Set Password</div>
    </div>

    <form id="setForm" class="hidden">
      <div class="field">
        <label for="email">Account</label>
        <input id="email" type="text" disabled />
      </div>

      <div class="field">
        <label for="password">New password (12+ characters)</label>
        <input id="password" type="password" autocomplete="new-password" minlength="12" />
      </div>

      <div class="field">
        <label for="confirm">Confirm new password</label>
        <input id="confirm" type="password" autocomplete="new-password" minlength="12" />
      </div>

      <button id="setBtn" type="submit">Save password</button>
    </form>

    <div id="status" class="status"></div>

    <div class="subtext">
      Passwords must be at least 12 characters and cannot be your email address.
      This link is single-use and expires automatically.
    </div>

    <div class="links-row">
      <a href="/login.html">Back to sign in</a>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const kind = params.get("kind") === "invite" ? "invite" : "reset";
    const token = params.get("token") || "";

    const form = document.getElementById("setForm");
    const setBtn = document.getElementById("setBtn");
    const statusBox = document.getElementById("status");
    const badge = document.getElementById("titleBadge");

    badge.textContent = kind === "invite" ? "Account Setup" : "Reset Password";

    function showStatus(message, kindClass) {
      statusBox.className = "status " + kindClass + " show";
      statusBox.textContent = message;
    }

    function clearStatus() {
      statusBox.className = "status";
      statusBox.textContent = "";
    }

    async function validateToken() {
      if (!token) {
        showStatus("This link is missing its token. Use the full link from your email.", "error");
        return;
      }

      try {
        const res = await fetch(
          "/api/auth/token-status?kind=" + encodeURIComponent(kind) +
          "&token=" + encodeURIComponent(token)
        );
        const data = await res.json();

        if (!data.valid) {
          showStatus(
            kind === "invite"
              ? "This invitation link is invalid or has expired. Ask an executive to resend it."
              : "This reset link is invalid or has expired. Request a new one from the login page.",
            "error"
          );
          return;
        }

        document.getElementById("email").value = data.email || "";
        form.classList.remove("hidden");
      } catch {
        showStatus("Unable to validate this link right now. Please try again.", "error");
      }
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      clearStatus();

      const password = document.getElementById("password").value;
      const confirm = document.getElementById("confirm").value;

      if (password.length < 12) {
        showStatus("Password must be at least 12 characters long.", "error");
        return;
      }

      if (password !== confirm) {
        showStatus("Passwords do not match.", "error");
        return;
      }

      setBtn.disabled = true;
      setBtn.textContent = "Saving...";

      try {
        const endpoint = kind === "invite" ? "/api/auth/accept-invite" : "/api/auth/reset";
        const res = await fetch(endpoint, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token, password })
        });

        const data = await res.json();
        if (!res.ok) {
          throw new Error(data.error || "Unable to save the password.");
        }

        form.classList.add("hidden");
        showStatus((data.message || "Password saved.") + " Redirecting to sign in...", "ok");
        setTimeout(() => { window.location.href = "/login.html"; }, 2500);
      } catch (err) {
        showStatus(err.message || "Unable to save the password.", "error");
      } finally {
        setBtn.disabled = false;
        setBtn.textContent = "Save password";
      }
    });

    validateToken();
  </script>
</body>
</html>
