<!DOCTYPE html>
<html lang="en">
<meta name="robots" content="noindex,nofollow,noarchive">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wilson AC & Appliance - Stripe Terminal</title>
  <link rel="stylesheet" href="internal-shell.css" />
  <style>
    :root {
      --bg: #f7f8fc;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #dbe1ea;
      --primary: #635bff;
      --primary-hover: #564ef0;
      --success-bg: #ecfdf5;
      --success-text: #065f46;
      --error-bg: #fef2f2;
      --error-text: #991b1b;
      --shadow: 0 10px 35px rgba(0, 0, 0, 0.08);
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #eef2ff 0%, var(--bg) 100%);
      color: var(--text);
      min-height: 100vh;
      padding: 32px 16px;
    }

    .wrap {
      max-width: 1480px;
      margin: 0 auto;
    }

    .card {
      max-width: 1020px;
      margin: 0 auto;
      background: var(--card);
      border: 1px solid rgba(99, 91, 255, 0.12);
      box-shadow: var(--shadow);
      border-radius: var(--radius);
      padding: 24px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    label {
      font-size: 14px;
      font-weight: 600;
    }

    input, textarea, select {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 13px 14px;
      font-size: 15px;
      background: #fff;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    input:focus, textarea:focus, select:focus {
      border-color: rgba(99, 91, 255, 0.75);
      box-shadow: 0 0 0 4px rgba(99, 91, 255, 0.12);
    }

    textarea {
      min-height: 96px;
      resize: vertical;
    }

    .hint {
      margin-top: -2px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 22px;
      flex-wrap: wrap;
    }

    button {
      appearance: none;
      border: none;
      background: var(--primary);
      color: white;
      padding: 14px 18px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.04s ease;
    }

    button:hover { background: var(--primary-hover); }
    button:active { transform: translateY(1px); }
    button:disabled {
      opacity: 0.65;
      cursor: wait;
    }

    .secondary {
      background: #eef2ff;
      color: #3730a3;
    }

    .secondary:hover {
      background: #e0e7ff;
    }

    .status {
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 12px;
      font-size: 14px;
      display: none;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    .status.success {
      display: block;
      background: var(--success-bg);
      color: var(--success-text);
    }

    .status.error {
      display: block;
      background: var(--error-bg);
      color: var(--error-text);
    }

    .result {
      margin-top: 22px;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px;
      background: #fafbff;
      display: none;
    }

    .result.show { display: block; }

    .result h2 {
      margin: 0 0 12px;
      font-size: 18px;
    }

    .result-row {
      margin-bottom: 12px;
    }

    .result-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 6px;
      font-weight: 700;
    }

    .result-value {
      font-size: 14px;
      line-height: 1.6;
      word-break: break-word;
    }

    .receipt-line {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      background: #f3f4f6;
      padding: 10px 12px;
      border-radius: 10px;
      display: inline-block;
    }

    .internal-nav {
      margin-top: 20px;
      border-top: 1px solid #e5e7eb;
      padding-top: 14px;
    }

    .internal-nav a {
      font-size: 20px;
      font-weight: 700;
      color: #4b5563;
      text-decoration: none;
      transition: color 0.2s ease;
    }

    .internal-nav a:hover {
      color: #3730a3;
    }

    .footer-note {
      margin-top: 18px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    @media (max-width: 720px) {
      .wrap { max-width: 820px; }
      .grid { grid-template-columns: 1fr; }
      .card { padding: 18px; }
    }
  </style>
</head>
<body data-shell-label="Terminal Charge" data-shell-icon="terminal">
  <div class="wrap">
    <div id="internal-shell-header"></div>
    <div class="card">
      <div class="grid">
        <div class="field full">
          <label for="reader">Reader</label>
          <select id="reader"></select>
        </div>

        <div class="field">
          <label for="creatorCode">Employee Code</label>
          <input id="creatorCode" maxlength="3" />
        </div>

        <div class="field">
          <label for="creatorName">Employee Name</label>
          <input id="creatorName" readonly />
        </div>

        <div class="field full">
          <label for="creatorEmail">Employee Email</label>
          <input id="creatorEmail" type="email" readonly />
        </div>

        <div class="field">
          <label for="customerName">Client Name</label>
          <input id="customerName" placeholder="Jane Smith" />
        </div>

        <div class="field">
          <label for="customerPhone">Client Phone</label>
          <input id="customerPhone" required inputmode="tel" maxlength="14" placeholder="512-555-1234" />
          <div class="hint">Required. This auto-formats as you type.</div>
        </div>

        <div class="field full">
          <label for="customerEmail">Client Email (optional)</label>
          <input id="customerEmail" type="email" placeholder="jane@example.com" />
        </div>

        <div class="field">
          <label for="amount">Amount</label>
          <input id="amount" type="number" min="0.01" step="0.01" placeholder="125.00" />
        </div>

        <div class="field">
          <label for="currency">Currency</label>
          <select id="currency">
            <option value="usd">USD</option>
          </select>
        </div>

        <div class="field full">
          <label for="salesOrder">Sales Order</label>
          <input id="salesOrder" placeholder="Payment to be applied to this ePASS or NetSuite Sales Order Number" />
          <div class="hint">This is also sent to the backend so it can be saved into Stripe metadata.</div>
        </div>

        <div class="field full">
          <label for="description">Description</label>
          <input id="description" placeholder="123 Main Street Appliances or Smith Residence HVAC System" />
        </div>

        <div class="field full">
          <label for="notes">Notes</label>
          <textarea id="notes" placeholder="Optional internal notes"></textarea>
        </div>
      </div>

      <div class="actions">
        <button id="chargeBtn" type="button">Start reader charge</button>
        <button id="refreshReaders" class="secondary" type="button">Refresh readers</button>
      </div>

      <div id="status" class="status"></div>

      <div id="result" class="result">
        <h2>Payment completed</h2>
        <div class="result-row">
          <div class="result-label">Reader confirmation</div>
          <div id="receiptLine" class="result-value"></div>
        </div>
        <div style="margin-top: 10px;">
          <button id="copyBtn" class="secondary" type="button">Copy confirmation</button>
        </div>
      </div>

      <div class="internal-nav">
        <a href="dashboard.html">← Dashboard</a>
      </div>

      <p class="footer-note">
        Important: This is an internal Wilson AC & Appliance tool and is not designed to be client facing.
      </p>
    </div>
  </div>

  <script src="employee-directory.js"></script>
  <script src="internal-shell.js"></script>
  <script>
    const apiBase = "";

    const readerSelect = document.getElementById("reader");
    const chargeBtn = document.getElementById("chargeBtn");
    const refreshReadersBtn = document.getElementById("refreshReaders");
    const statusBox = document.getElementById("status");
    const resultBox = document.getElementById("result");
    const receiptLineEl = document.getElementById("receiptLine");
    const copyBtn = document.getElementById("copyBtn");
    const customerPhoneInput = document.getElementById("customerPhone");
    const creatorCodeInput = document.getElementById("creatorCode");
    const creatorNameInput = document.getElementById("creatorName");
    const creatorEmailInput = document.getElementById("creatorEmail");

    let latestReceiptLine = "";
    function showStatus(type, message) {
      statusBox.className = `status ${type}`;
      statusBox.textContent = message;
    }

    function clearStatus() {
      statusBox.className = "status";
      statusBox.textContent = "";
    }

    function clearResult() {
      resultBox.classList.remove("show");
      receiptLineEl.innerHTML = "";
      latestReceiptLine = "";
    }

    function formatPhoneNumber(value) {
      const digits = value.replace(/\D/g, "").slice(0, 10);

      if (digits.length <= 3) return digits;
      if (digits.length <= 6) return `${digits.slice(0, 3)}-${digits.slice(3)}`;
      return `${digits.slice(0, 3)}-${digits.slice(3, 6)}-${digits.slice(6)}`;
    }

    function getDigitsOnlyPhone(value) {
      return value.replace(/\D/g, "").slice(0, 10);
    }

    function applyCreatorLookup() {
      const code = creatorCodeInput.value.trim().toUpperCase();
      creatorCodeInput.value = code;
      const teamDirectory = window.WILSON_EMPLOYEE_DIRECTORY || {};

      const match = teamDirectory[code];

      if (!code) {
        creatorNameInput.value = "";
        creatorEmailInput.value = "";
        return true;
      }

      if (!match) {
        creatorNameInput.value = "";
        creatorEmailInput.value = "";
        return false;
      }

      creatorNameInput.value = match.name;
      creatorEmailInput.value = match.email;
      return true;
    }

    customerPhoneInput.addEventListener("input", (event) => {
      event.target.value = formatPhoneNumber(event.target.value);
    });

    function handleCreatorLookupInput() {
      const isValid = applyCreatorLookup();
      if (creatorCodeInput.value.trim() && !isValid) {
        showStatus("error", "Employee code not found. Please enter a valid employee code.");
      } else {
        clearStatus();
      }
    }

    creatorCodeInput.addEventListener("input", handleCreatorLookupInput);
    creatorCodeInput.addEventListener("change", handleCreatorLookupInput);
    creatorCodeInput.addEventListener("blur", handleCreatorLookupInput);

    async function loadReaders() {
      clearStatus();

      try {
        const res = await fetch(`${apiBase}/api/terminal/readers`);
        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.error || "Unable to load readers.");
        }

        readerSelect.innerHTML = "";

        const onlineReaders = (data.readers || []).filter(
          (reader) => reader.status === "online"
        );

        if (onlineReaders.length === 0) {
          showStatus("error", "No online readers found.");
          return;
        }

        for (const reader of onlineReaders) {
          const option = document.createElement("option");
          option.value = reader.id;
          option.textContent = reader.label || reader.id;
          readerSelect.appendChild(option);
        }

        showStatus("success", "Reader list refreshed successfully.");
      } catch (err) {
        showStatus("error", `Error loading readers: ${err.message}`);
      }
    }

    async function checkStatus(paymentIntentId) {
      const res = await fetch(`${apiBase}/api/terminal/payment-status/${paymentIntentId}`);
      const data = await res.json();

      if (!res.ok) {
        throw new Error(data.error || "Unable to retrieve payment status.");
      }

      return data;
    }

    async function pollPayment(paymentIntentId, salesOrder) {
      for (let i = 0; i < 40; i++) {
        await new Promise((resolve) => setTimeout(resolve, 3000));
        const payment = await checkStatus(paymentIntentId);

        if (payment.status === "succeeded") {
          const date = new Date(payment.created * 1000);

          const formattedDate = date.toLocaleString("en-US", {
            month: "2-digit",
            day: "2-digit",
            year: "2-digit",
            hour: "numeric",
            minute: "2-digit"
          });

          const brand = payment.cardBrand ? payment.cardBrand.toUpperCase() : "CARD";
          const last4 = payment.last4 || "????";

          const receiptLine = salesOrder
            ? `${salesOrder} | ${brand} **** ${last4} | ${formattedDate} | ${payment.id}`
            : `${brand} **** ${last4} | ${formattedDate} | ${payment.id}`;

          latestReceiptLine = receiptLine;
          receiptLineEl.innerHTML = `<span class="receipt-line">${receiptLine}</span>`;
          resultBox.classList.add("show");

          try {
            await navigator.clipboard.writeText(receiptLine);
            showStatus("success", "Payment succeeded. Confirmation copied to clipboard.");
          } catch {
            showStatus("success", "Payment succeeded.");
          }

          return;
        }

        if (payment.status === "canceled") {
          showStatus(
            "error",
            `Payment was canceled.\nPaymentIntent: ${payment.id}\nStatus: ${payment.status}`
          );
          return;
        }

        showStatus(
          "success",
          `Waiting for customer to complete payment on the reader...\nPaymentIntent: ${payment.id}\nStatus: ${payment.status}`
        );
      }

      showStatus("error", "Timed out waiting for final payment status.");
    }

    refreshReadersBtn.addEventListener("click", loadReaders);

    copyBtn.addEventListener("click", async () => {
      if (!latestReceiptLine) return;

      try {
        await navigator.clipboard.writeText(latestReceiptLine);
        showStatus("success", "Confirmation copied to clipboard.");
      } catch {
        showStatus("error", "Could not copy confirmation.");
      }
    });

    chargeBtn.addEventListener("click", async () => {
      clearStatus();
      clearResult();

      const rawPhone = document.getElementById("customerPhone").value.trim();
      const phoneDigits = getDigitsOnlyPhone(rawPhone);

      const payload = {
        readerId: readerSelect.value,
        customerName: document.getElementById("customerName").value.trim(),
        customerPhone: rawPhone,
        customerPhoneDigits: phoneDigits,
        customerEmail: document.getElementById("customerEmail").value.trim(),
        creatorCode: creatorCodeInput.value.trim(),
        creatorName: creatorNameInput.value.trim(),
        creatorEmail: creatorEmailInput.value.trim(),
        amount: document.getElementById("amount").value,
        currency: document.getElementById("currency").value,
        salesOrder: document.getElementById("salesOrder").value.trim(),
        description: document.getElementById("description").value.trim(),
        notes: document.getElementById("notes").value.trim()
      };

      if (!payload.readerId || !payload.amount) {
        showStatus("error", "Please select a reader and enter an amount.");
        return;
      }

      if (!payload.customerPhone) {
        showStatus("error", "Please enter the client phone number.");
        return;
      }

      if (phoneDigits.length !== 10) {
        showStatus("error", "Please enter a valid 10-digit phone number.");
        return;
      }

      if (!applyCreatorLookup() || !payload.creatorCode || !payload.creatorName || !payload.creatorEmail) {
        showStatus("error", "Please enter a valid employee code before starting the terminal charge.");
        return;
      }

      if (!payload.salesOrder || !payload.description) {
        showStatus("error", "Please enter both the sales order and description.");
        return;
      }

      chargeBtn.disabled = true;
      chargeBtn.textContent = "Starting...";

      try {
        const res = await fetch(`${apiBase}/api/terminal/charge`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(payload)
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.error || "Charge failed.");
        }

        showStatus(
          "success",
          `Reader is ready. Have the customer tap, insert, or swipe now.\nPaymentIntent: ${data.paymentIntentId}`
        );

        await pollPayment(data.paymentIntentId, payload.salesOrder);
      } catch (err) {
        showStatus("error", `Error: ${err.message}`);
      } finally {
        chargeBtn.disabled = false;
        chargeBtn.textContent = "Start reader charge";
      }
    });

    loadReaders();
  </script>
</body>
</html>
